<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms - Ultra Optimized</title>
    <style>
        body { margin: 0; overflow: hidden; background: #dac05e; touch-action: none; font-family: monospace; }
        #ui-container { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 20px; box-sizing: border-box; }
        .btn { pointer-events: auto; padding: 12px; background: rgba(0,0,0,0.8); color: white; border: 2px solid #fff; border-radius: 6px; font-size: 14px; margin-bottom: 8px; min-width: 140px; font-weight: bold; }
        #move-zone { position: absolute; bottom: 30px; left: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        #stick { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; margin: -15px; background: rgba(0,0,0,0.4); border-radius: 50%; }
    </style>
</head>
<body>
    <div id="move-zone"><div id="stick"></div></div>
    <div id="ui-container">
        <button id="build-btn" class="btn" style="background: #e6b400; color: #000;">B - BUILD</button>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdac05e);
        scene.fog = new THREE.Fog(0xdac05e, 1, 40);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 60);
        camera.position.set(0, 1.7, 0);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        // 環境光を強めにして、個別のライトを減らす
        scene.add(new THREE.AmbientLight(0xffffff, 0.9));
        const mainLight = new THREE.PointLight(0xffffee, 1.2, 25);
        scene.add(mainLight);

        // 天井を1つの大きな板にしてプレイヤーに追従させる
        const ceilingGeo = new THREE.PlaneGeometry(100, 100);
        const ceilingMat = new THREE.MeshLambertMaterial({ color: 0xdac05e });
        const ceiling = new THREE.Mesh(ceilingGeo, ceilingMat);
        ceiling.rotation.x = Math.PI / 2;
        ceiling.position.y = 4;
        scene.add(ceiling);

        // 蛍光灯の見た目だけを配置（光らせないことで軽量化）
        const lampGeo = new THREE.BoxGeometry(0.4, 0.02, 2);
        const lampMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
        const lamps = new THREE.Group();
        for(let i = -5; i <= 5; i++) {
            for(let j = -5; j <= 5; j++) {
                const l = new THREE.Mesh(lampGeo, lampMat);
                l.position.set(i * 10, 3.99, j * 10);
                lamps.add(l);
            }
        }
        scene.add(lamps);

        const wallMat = new THREE.MeshLambertMaterial({ color: 0xccbb55 });
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x8a7c52 });
        const chunks = new Map();
        const colliders = [];

        function spawnChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks.has(key)) return;

            const group = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), floorMat);
            floor.rotation.x = -Math.PI / 2;
            group.add(floor);

            const seed = Math.abs(Math.sin(cx * 12.9 + cz * 78.2) * 437) % 1;
            if (seed > 0.75) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 0.5), wallMat);
                w.position.set(0, 2, 4);
                group.add(w);
                const box = new THREE.Box3().setFromObject(w);
                box.translate(new THREE.Vector3(cx * 8, 0, cz * 8));
                colliders.push({ box, id: key });
            }

            group.position.set(cx * 8, 0, cz * 8);
            scene.add(group);
            chunks.set(key, group);
        }

        let keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // マウス・スマホ操作は維持
        window.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.003));
            }
        });
        renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();

        function animate() {
            requestAnimationFrame(animate);
            
            let mx = 0, mz = 0;
            if (keys['KeyW']) mz = -1; if (keys['KeyS']) mz = 1;
            if (keys['KeyA']) mx = -1; if (keys['KeyD']) mx = 1;

            if (mx !== 0 || mz !== 0) {
                const dir = new THREE.Vector3(mx, 0, mz).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const nextPos = camera.position.clone().addScaledVector(dir, 0.15);
                const pBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(0.6, 1.8, 0.6));
                if (!colliders.some(c => pBox.intersectsBox(c.box))) {
                    camera.position.copy(nextPos);
                }
            }

            // 天井とライトをプレイヤーに追従させる（これで無限に見える）
            ceiling.position.x = camera.position.x;
            ceiling.position.z = camera.position.z;
            lamps.position.x = Math.floor(camera.position.x / 10) * 10;
            lamps.position.z = Math.floor(camera.position.z / 10) * 10;
            mainLight.position.copy(camera.position);

            const cx = Math.round(camera.position.x / 8);
            const cz = Math.round(camera.position.z / 8);
            for (let x = cx - 4; x <= cx + 4; x++) {
                for (let z = cz - 4; z <= cz + 4; z++) spawnChunk(x, z);
            }

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
