<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms MMO - Realistic Hazmat</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1) saturate(1.2); }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .vhs-text { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 11px; text-shadow: 1px 1px #000; line-height: 1.4; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 80px; height: 80px; border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; background: rgba(0,255,0,0.1); z-index: 1000; pointer-events: auto; }
        #stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; background: #0f0; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="vhs-text" id="status">REC ● <span id="timer">00:00:00</span><br>A-SYNC ASSET: ACTIVE<br>STATUS: INVESTIGATING...</div>
    </div>
    <div id="joy-base"><div id="stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, onValue, onChildRemoved, onDisconnect } from 'firebase/database';

        const firebaseConfig = {
            apiKey: "AIzaSyDknkrM78uvtu5BfAYsuJCa-oRB2rfH3HQ",
            authDomain: "backrooms-mmo.firebaseapp.com",
            databaseURL: "https://backrooms-mmo-default-rtdb.firebaseio.com",
            projectId: "backrooms-mmo",
            storageBucket: "backrooms-mmo.firebasestorage.app",
            messagingSenderId: "64360079618",
            appId: "1:64360079618:web:240178c335c04cd373621b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myId = "A-SYNC_" + Math.random().toString(36).substring(7);
        const myRef = ref(db, 'players/' + myId);

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a00);
        scene.fog = new THREE.Fog(0x2a2a00, 1, 22);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
        camera.position.set(0, 1.7, 0); camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ReinhardToneMapping;
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));
        const dirLight = new THREE.DirectionalLight(0xffffff, 0.5);
        dirLight.position.set(5, 10, 5); scene.add(dirLight);

        const otherPlayers = new Map();

        // --- ★リアルな防護服モデル生成 ---
        function createRealisticHazmat() {
            const group = new THREE.Group();

            // PBRマテリアル：ビニールのような黄色
            const bodyMat = new THREE.MeshStandardMaterial({ 
                color: 0xddcc00, 
                roughness: 0.3, 
                metalness: 0.1,
                emissive: 0x222200,
                emissiveIntensity: 0.2
            });

            const visorMat = new THREE.MeshStandardMaterial({ 
                color: 0x050505, 
                roughness: 0.0, 
                metalness: 0.9 
            });

            // 胴体 (少し太めに)
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.35, 0.7, 4, 12), bodyMat);
            body.position.y = 0.85; group.add(body);

            // 頭部・フード
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 16, 16), bodyMat);
            head.position.y = 1.55; head.scale.set(1, 1.1, 1);
            group.add(head);

            // バイザー (不気味な反射)
            const visor = new THREE.Mesh(new THREE.SphereGeometry(0.18, 16, 16), visorMat);
            visor.scale.set(1.1, 0.8, 0.5);
            visor.position.set(0, 1.58, 0.16);
            group.add(visor);

            // 生命維持装置（バックパック）
            const bpGroup = new THREE.Group();
            const pack = new THREE.Mesh(new THREE.BoxGeometry(0.45, 0.65, 0.25), bodyMat);
            pack.position.set(0, 1.0, -0.3);
            bpGroup.add(pack);
            // 酸素シリンダー的なパーツ
            const tank = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.5), new THREE.MeshStandardMaterial({color: 0x333333}));
            tank.position.set(0.12, 1.0, -0.4); bpGroup.add(tank);
            group.add(bpGroup);

            // 手足（少しダボつかせる）
            const limbGeom = new THREE.CapsuleGeometry(0.12, 0.55, 4, 8);
            const rArm = new THREE.Mesh(limbGeom, bodyMat); rArm.position.set(-0.45, 1.15, 0); group.add(rArm);
            const lArm = new THREE.Mesh(limbGeom, bodyMat); lArm.position.set(0.45, 1.15, 0); group.add(lArm);
            
            const legGeom = new THREE.CapsuleGeometry(0.15, 0.6, 4, 8);
            const rLeg = new THREE.Mesh(legGeom, bodyMat); rLeg.position.set(-0.18, 0.45, 0); group.add(rLeg);
            const lLeg = new THREE.Mesh(legGeom, bodyMat); lLeg.position.set(0.18, 0.45, 0); group.add(lLeg);

            // 黒いブーツ
            const bootMat = new THREE.MeshStandardMaterial({color: 0x111111});
            const bootGeom = new THREE.BoxGeometry(0.2, 0.15, 0.35);
            const rBoot = new THREE.Mesh(bootGeom, bootMat); rBoot.position.set(-0.18, 0.1, 0.05); group.add(rBoot);
            const lBoot = new THREE.Mesh(bootGeom, bootMat); lBoot.position.set(0.18, 0.1, 0.05); group.add(lBoot);

            return group;
        }

        // --- Firebase & Sync ---
        onValue(ref(db, 'players'), snap => {
            const d = snap.val(); if(!d) return;
            for(let id in d) {
                if(id === myId) continue;
                if(!otherPlayers.has(id)) {
                    const model = createRealisticHazmat();
                    scene.add(model); otherPlayers.set(id, model);
                }
                const m = otherPlayers.get(id);
                m.position.lerp(new THREE.Vector3(d[id].x, d[id].y-1.7, d[id].z), 0.2);
                m.rotation.y = d[id].ry;
            }
        });

        onChildRemoved(ref(db, 'players'), snap => {
            if(otherPlayers.has(snap.key)){ scene.remove(otherPlayers.get(snap.key)); otherPlayers.delete(snap.key); }
        });

        onDisconnect(myRef).remove();

        // --- Controls & Animation ---
        let mv = {x:0, z:0}, moveId = null, lookId = null, lastL = {x:0, y:0};
        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) moveId = t.identifier;
                else { lookId = t.identifier; lastL = {x:t.clientX, y:t.clientY}; }
            }
        }, {passive:false});

        window.addEventListener('touchmove', e => {
            e.preventDefault();
            for(let t of e.touches) {
                if(t.identifier === moveId) {
                    const dx = t.clientX - 80, dy = t.clientY - (window.innerHeight - 80);
                    const d = Math.min(35, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy, dx);
                    mv = {x: Math.cos(a)*(d/35), z: Math.sin(a)*(d/35)};
                    document.getElementById('stick').style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                } else if(t.identifier === lookId) {
                    camera.rotation.y -= (t.clientX - lastL.x) * 0.007;
                    camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - (t.clientY - lastL.y) * 0.007));
                    lastL = {x:t.clientX, y:t.clientY};
                }
            }
        }, {passive:false});

        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === moveId) { moveId = null; mv = {x:0, z:0}; document.getElementById('stick').style.transform = 'none'; }
                if(t.identifier === lookId) lookId = null;
            }
        });

        function animate(t) {
            requestAnimationFrame(animate);
            if(mv.x || mv.z) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                camera.position.addScaledVector(f, -mv.z*0.12).addScaledVector(r, mv.x*0.12);
                set(myRef, { x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: camera.rotation.y });
            }
            renderer.render(scene, camera);
            document.getElementById('timer').innerText = new Date(t).toISOString().substr(14, 8);
        }
        animate(0);
    </script>
</body>
</html>
