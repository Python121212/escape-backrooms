<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms - Stick Fixed</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a00; touch-action: none; }
        canvas { display: block; filter: contrast(1.2) brightness(0.9); image-rendering: pixelated; }
        
        /* UIレイヤー */
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .vhs-text { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 16px; text-shadow: 1px 1px #000; }
        
        /* 操作ボタン */
        .controls { position: absolute; bottom: 20px; right: 20px; pointer-events: none; display: flex; flex-direction: column; }
        .btn { pointer-events: auto; padding: 12px; background: rgba(0,40,0,0.9); color: #0f0; border: 1px solid #0f0; margin-top: 5px; font-size: 12px; min-width: 100px; font-family: monospace; }
        
        /* ★ジョイスティック（ここを修正） */
        #joy-container { 
            position: absolute; bottom: 40px; left: 40px; 
            width: 100px; height: 100px; 
            border: 2px solid #0f0; border-radius: 50%; 
            background: rgba(0, 255, 0, 0.1);
            z-index: 1000; pointer-events: auto; 
            touch-action: none;
        }
        #stick { 
            position: absolute; top: 50%; left: 50%; 
            width: 44px; height: 44px; 
            margin: -22px; 
            background: #0f0; border-radius: 50%; 
            box-shadow: 0 0 10px #0f0;
            pointer-events: none; 
        }
    </style>
</head>
<body>
    <div id="ui">
        <div class="vhs-text">REC ● <span id="timer">00:00:00</span></div>
        <div class="controls">
            <button id="action-btn" class="btn" style="display:none;">INTERACT</button>
            <button id="place-btn" class="btn" style="display:none;">PLACE</button>
            <button id="type-btn" class="btn" style="display:none;">WALL</button>
            <button id="build-btn" class="btn">BUILD MODE</button>
        </div>
    </div>
    
    <div id="joy-container">
        <div id="stick"></div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a00);
        scene.fog = new THREE.Fog(0x1a1a00, 1, 25);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
        camera.position.set(0, 1.7, 0); 
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(0.4); // VHSの質感を出しつつ軽量化
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 2.5, 18);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));

        const colliders = [], shutters = [], chunks = new Map();
        const wallTypes = [{n:'SHUTTER', c:0xcccccc, s:true}, {n:'GLASS', c:0x88ccff, o:0.4}, {n:'IRON', c:0x333333}, {n:'WALL', c:0xccbb55}];
        let typeIdx = 0, isBuild = false;

        const ghost = new THREE.Mesh(new THREE.BoxGeometry(4,4,0.4), new THREE.MeshBasicMaterial({color:0x00ff00, transparent:true, opacity:0.3}));
        ghost.visible = false; scene.add(ghost);

        function spawn(cx, cz) {
            const k = `${cx},${cz}`; if(chunks.has(k)) return;
            const g = new THREE.Group();
            const f = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0x8a7c52}));
            f.rotation.x=-Math.PI/2; g.add(f);
            const c = f.clone(); c.rotation.x=Math.PI/2; c.position.y=4; g.add(c);
            
            // 壁の自動配置（軽量版）
            if(Math.abs(Math.sin(cx*1.3+cz*0.7)) > 0.8) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8,4,0.3), new THREE.MeshLambertMaterial({color:0xccbb55}));
                w.position.set(0,2,4); g.add(w);
                colliders.push({box: new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(cx*8,0,cz*8))});
            }
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(k, g);
        }

        // --- 操作ロジック ---
        let mv = {x:0, z:0}, lookId = null, lastL = {x:0, y:0};
        const joy = document.getElementById('joy-container'), st = document.getElementById('stick');

        joy.addEventListener('touchstart', (e) => e.preventDefault(), {passive:false});
        joy.addEventListener('touchmove', (e) => {
            const t = e.touches[0], r = joy.getBoundingClientRect();
            const dx = t.clientX-(r.left+50), dy = t.clientY-(r.top+50);
            const d = Math.min(40, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy,dx);
            mv = {x: Math.cos(a)*(d/40), z: Math.sin(a)*(d/40)};
            st.style.transform = `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
        }, {passive:false});

        window.addEventListener('touchend', (e) => {
            mv={x:0,z:0}; st.style.transform='none'; lookId=null;
        });

        window.addEventListener('touchstart', (e) => {
            if(e.touches[0].clientX > window.innerWidth/2) {
                lookId = e.touches[0].identifier;
                lastL = {x:e.touches[0].clientX, y:e.touches[0].clientY};
            }
        });

        window.addEventListener('touchmove', (e) => {
            const t = Array.from(e.touches).find(v => v.identifier === lookId);
            if(t) {
                camera.rotation.y -= (t.clientX-lastL.x)*0.006;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x-(t.clientY-lastL.y)*0.006));
                lastL={x:t.clientX, y:t.clientY};
            }
        });

        // --- UIアクション ---
        document.getElementById('build-btn').onclick = (e) => { 
            e.stopPropagation(); isBuild=!isBuild; ghost.visible=isBuild; 
            document.getElementById('place-btn').style.display = document.getElementById('type-btn').style.display = isBuild?'block':'none'; 
        };
        document.getElementById('type-btn').onclick = (e) => { 
            e.stopPropagation(); typeIdx=(typeIdx+1)%wallTypes.length; 
            document.getElementById('type-btn').innerText=wallTypes[typeIdx].n; 
        };
        document.getElementById('place-btn').onclick = (e) => { 
            e.stopPropagation(); 
            const t = wallTypes[typeIdx];
            const m = new THREE.Mesh(new THREE.BoxGeometry(4,4,0.4), new THREE.MeshLambertMaterial({color:t.c, transparent:!!t.o, opacity:t.o||1}));
            m.position.copy(ghost.position); m.rotation.y = ghost.rotation.y; scene.add(m);
            const col = { box: new THREE.Box3().setFromObject(m), m };
            colliders.push(col);
            if(t.s) shutters.push({ m, col, open:false, ty:m.position.y, iy:m.position.y, moving:false });
        };

        function animate(t) {
            requestAnimationFrame(animate);
            const time = t * 0.001;
            document.getElementById('timer').innerText = new Date(t).toISOString().substr(14, 8);

            if(mv.x || mv.z) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const vel = new THREE.Vector3().addScaledVector(f, -mv.z).addScaledVector(r, mv.x).setLength(0.12);
                const next = camera.position.clone().add(vel);
                if(!colliders.some(c => new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(0.5,1.5,0.5)).intersectsBox(c.box))) camera.position.copy(next);
                camera.position.y = 1.7 + Math.sin(time*8)*0.02; // 歩行時の手ブレ
            }

            shutters.forEach(s => { if(s.moving){ s.m.position.y += (s.ty-s.m.position.y)*0.1; s.col.box.setFromObject(s.m); if(Math.abs(s.ty-s.m.position.y)<0.01) s.moving=false; }});
            
            if(isBuild) {
                const f = new THREE.Vector3(0,0,-4).applyQuaternion(camera.quaternion);
                ghost.position.set(Math.round((camera.position.x+f.x)/2)*2, 2, Math.round((camera.position.z+f.z)/2)*2);
                ghost.rotation.y = Math.round(camera.rotation.y/(Math.PI/2))*(Math.PI/2);
            }

            const cx=Math.round(camera.position.x/8), cz=Math.round(camera.position.z/8);
            for(let i=cx-2; i<=cx+2; i++) for(let j=cz-2; j<=cz+2; j++) spawn(i,j);

            light.position.copy(camera.position);
            renderer.render(scene, camera);
        }
        animate(0);
    </script>
</body>
</html>
