<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms MMO - Multiplayer Sync Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .vhs-text { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 11px; text-shadow: 1px 1px #000; }
        #build-menu { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 8px; pointer-events: auto; z-index: 200; }
        .build-btn { width: 50px; height: 50px; background: rgba(0,255,0,0.1); border: 2px solid #0f0; color: #0f0; font-size: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 80px; height: 80px; border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; background: rgba(0,255,0,0.1); pointer-events: auto; z-index: 200; }
        #stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; background: #0f0; border-radius: 50%; pointer-events: none; }
    </style>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div id="ui">
        <div class="vhs-text" id="status">REC ● <span id="timer">00:00:00</span><br>VOICE: <span id="vc-status">OFFLINE</span><br>PLAYERS: <span id="p-count">1</span></div>
    </div>
    <div id="joy-base"><div id="stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, push, onValue, onChildAdded, onChildRemoved, onDisconnect } from 'firebase/database';

        const firebaseConfig = {
            apiKey: "AIzaSyDknkrM78uvtu5BfAYsuJCa-oRB2rfH3HQ",
            authDomain: "backrooms-mmo.firebaseapp.com",
            databaseURL: "https://backrooms-mmo-default-rtdb.firebaseio.com",
            projectId: "backrooms-mmo",
            storageBucket: "backrooms-mmo.firebasestorage.app",
            messagingSenderId: "64360079618",
            appId: "1:64360079618:web:240178c335c04cd373621b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myId = "P_" + Math.random().toString(36).substring(2, 7);
        const myRef = ref(db, 'players/' + myId);
        const playersRef = ref(db, 'players');

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a00);
        scene.fog = new THREE.Fog(0x1a1a00, 1, 18);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
        camera.position.set(0, 1.7, 0); camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        const otherPlayers = new Map();
        const hazmatMat = new THREE.MeshLambertMaterial({ color: 0xcccc55 });

        // アバター作成
        function createAvatar() {
            const g = new THREE.Group();
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 1, 8), hazmatMat); body.position.y = 0.8; g.add(body);
            const head = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 0.4, 8), hazmatMat); head.position.y = 1.45; g.add(head);
            g.userData = { targetPos: new THREE.Vector3(), targetRot: 0 };
            return g;
        }

        // --- Firebase 同期コア ---
        onValue(playersRef, (snap) => {
            const data = snap.val(); if(!data) return;
            document.getElementById('p-count').innerText = Object.keys(data).length;
            
            for(let id in data) {
                if(id === myId) continue;
                if(!otherPlayers.has(id)) {
                    const model = createAvatar();
                    scene.add(model);
                    otherPlayers.set(id, model);
                }
                const m = otherPlayers.get(id);
                m.userData.targetPos.set(data[id].x, data[id].y - 1.7, data[id].z);
                m.userData.targetRot = data[id].ry;
            }
        });

        onChildRemoved(playersRef, (snap) => {
            const m = otherPlayers.get(snap.key);
            if(m) { scene.remove(m); otherPlayers.delete(snap.key); }
        });

        onDisconnect(myRef).remove();

        // --- 操作系 (PC/スマホ統合) ---
        let keys = {}, mv = {x:0, z:0}, moveId = null;
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        renderer.domElement.addEventListener('mousedown', () => renderer.domElement.requestPointerLock());
        window.addEventListener('mousemove', e => {
            if(document.pointerLockElement === renderer.domElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.002));
            }
        });

        // アニメーション
        let lastSend = 0;
        function animate(t) {
            requestAnimationFrame(animate);
            
            // 自分の移動
            let kx = (keys['KeyD']?1:0)-(keys['KeyA']?1:0);
            let kz = (keys['KeyS']?1:0)-(keys['KeyW']?1:0);
            if(kx || kz) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                camera.position.addScaledVector(f, -kz*0.12).addScaledVector(r, kx*0.12);
            }

            // 他人の動きを滑らかに（Lerp）
            otherPlayers.forEach(m => {
                m.position.lerp(m.userData.targetPos, 0.2);
                m.rotation.y = THREE.MathUtils.lerp(m.rotation.y, m.userData.targetRot, 0.2);
            });

            // Firebaseへ送信 (0.1秒ごと)
            if(t - lastSend > 100) {
                set(myRef, { x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: camera.rotation.y });
                lastSend = t;
            }

            renderer.render(scene, camera);
        }
        animate(0);
    </script>
</body>
</html>
