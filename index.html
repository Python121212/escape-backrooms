<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms MMO - Save Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); image-rendering: pixelated; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .vhs-text { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 11px; text-shadow: 1px 1px #000; line-height: 1.4; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 80px; height: 80px; border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; background: rgba(0,255,0,0.1); z-index: 1000; pointer-events: auto; }
        #stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; background: #0f0; border-radius: 50%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(255,255,255,0.5); border-radius: 50%; margin: -2px; pointer-events: none; display: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="vhs-text" id="status">REC ● <span id="timer">00:00:00</span><br>SYSTEM: A-SYNC PROTOCOL<br>BATTERY: OPTIMIZED (SAVE MODE)</div>
        <div id="crosshair"></div>
    </div>
    <div id="joy-base"><div id="stick"></div></div>

    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, onValue, onChildRemoved, onDisconnect } from 'firebase/database';

        const firebaseConfig = {
            apiKey: "AIzaSyDknkrM78uvtu5BfAYsuJCa-oRB2rfH3HQ",
            authDomain: "backrooms-mmo.firebaseapp.com",
            databaseURL: "https://backrooms-mmo-default-rtdb.firebaseio.com",
            projectId: "backrooms-mmo",
            storageBucket: "backrooms-mmo.firebasestorage.app",
            messagingSenderId: "64360079618",
            appId: "1:64360079618:web:240178c335c04cd373621b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myId = sessionStorage.getItem('backrooms_id') || "A-SYNC_" + Math.random().toString(36).substring(7);
        sessionStorage.setItem('backrooms_id', myId);
        const myRef = ref(db, 'players/' + myId);

        // 3D Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a00);
        scene.fog = new THREE.Fog(0x1a1a00, 1, 20);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
        camera.position.set(0, 1.7, 0); camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 0.6 : 1);
        document.body.appendChild(renderer.domElement);

        const flashLight = new THREE.SpotLight(0xffffff, 10, 15, Math.PI/6, 0.5, 1);
        camera.add(flashLight);
        flashLight.target.position.set(0, 0, -1);
        camera.add(flashLight.target);
        scene.add(camera);
        scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        const colliders = [], chunks = new Map(), otherPlayers = new Map();

        function createPlayerModel() {
            const group = new THREE.Group();
            const container = new THREE.Group();
            group.add(container);
            const hazmatMat = new THREE.MeshLambertMaterial({ color: 0xcccc55 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.32, 1.0, 8), hazmatMat);
            body.position.y = 0.8; container.add(body);
            
            const rArmP = new THREE.Group(); rArmP.position.set(-0.35, 1.3, 0); 
            const rArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.7, 6), hazmatMat);
            rArm.position.y = -0.35; rArmP.add(rArm); container.add(rArmP);

            const lArmP = new THREE.Group(); lArmP.position.set(0.35, 1.3, 0);
            const lArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.7, 6), hazmatMat);
            lArm.position.y = -0.35; lArmP.add(lArm); container.add(lArmP);

            const rLegP = new THREE.Group(); rLegP.position.set(-0.16, 0.7, 0);
            const rLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.7, 6), hazmatMat);
            rLeg.position.y = -0.35; rLegP.add(rLeg); container.add(rLegP);

            const lLegP = new THREE.Group(); lLegP.position.set(0.16, 0.7, 0);
            const lLeg = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.7, 6), hazmatMat);
            lLeg.position.y = -0.35; lLegP.add(lLeg); container.add(lLegP);

            container.rotation.y = Math.PI;
            group.userData = { rArmP, lArmP, rLegP, lLegP, targetPos: new THREE.Vector3(), targetRot: 0, walking: false };
            return group;
        }

        onDisconnect(myRef).remove();

        onValue(ref(db, 'players'), (snapshot) => {
            const data = snapshot.val();
            if(!data) return;
            for (let id in data) {
                if (id === myId) continue;
                if (!otherPlayers.has(id)) {
                    const model = createPlayerModel();
                    scene.add(model);
                    otherPlayers.set(id, model);
                }
                const m = otherPlayers.get(id);
                const p = data[id];
                m.userData.targetPos.set(p.x, p.y - 1.7, p.z);
                m.userData.targetRot = p.ry;
                m.userData.walking = p.walking;
            }
        });

        onChildRemoved(ref(db, 'players'), (snapshot) => {
            const id = snapshot.key;
            if (otherPlayers.has(id)) { scene.remove(otherPlayers.get(id)); otherPlayers.delete(id); }
        });

        const canvas = renderer.domElement;
        canvas.addEventListener('click', () => canvas.requestPointerLock());

        let keys = {};
        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        let mv = {x:0, z:0}, moveId = null, lookId = null, lastL = {x:0, y:0};
        const joyBase = document.getElementById('joy-base'), st = document.getElementById('stick');

        window.addEventListener('touchstart', (e) => {
            for(let t of e.changedTouches) {
                const r = joyBase.getBoundingClientRect();
                if(t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom) moveId = t.identifier;
                else if(lookId === null) { lookId = t.identifier; lastL = { x: t.clientX, y: t.clientY }; }
            }
        });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for(let t of e.touches) {
                if(t.identifier === moveId) {
                    const r = joyBase.getBoundingClientRect();
                    const dx = t.clientX - (r.left + 40), dy = t.clientY - (r.top + 40);
                    const d = Math.min(35, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy, dx);
                    mv = { x: Math.cos(a) * (d / 35), z: Math.sin(a) * (d / 35) };
                    st.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                } else if(t.identifier === lookId) {
                    camera.rotation.y -= (t.clientX - lastL.x) * 0.008;
                    camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - (t.clientY - lastL.y) * 0.008));
                    lastL = { x: t.clientX, y: t.clientY };
                }
            }
        }, {passive:false});

        window.addEventListener('touchend', (e) => {
            for(let t of e.changedTouches) {
                if(t.identifier === moveId) { moveId = null; mv = {x:0, z:0}; st.style.transform = 'none'; }
                if(t.identifier === lookId) lookId = null;
            }
        });

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === canvas) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.002));
            }
        });

        function spawn(cx, cz) {
            const k = `${cx},${cz}`; if(chunks.has(k)) return;
            const g = new THREE.Group();
            const f = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0x9a8c62})); f.rotation.x=-Math.PI/2; g.add(f);
            const c = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0xddcc66})); c.rotation.x=Math.PI/2; c.position.y=4; g.add(c);
            if(Math.abs(Math.sin(cx*1.3+cz*0.7)) > 0.85) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8,4,0.3), new THREE.MeshLambertMaterial({color:0xddcc66})); w.position.set(0,2,4); g.add(w);
                colliders.push({box: new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(cx*8,0,cz*8))});
            }
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(k, g);
        }

        let lastSend = 0, lastPos = new THREE.Vector3(), lastRot = 0, bobTime = 0;
        function animate(t) {
            requestAnimationFrame(animate);
            let kx = 0, kz = 0;
            if(keys['KeyW']) kz -= 1; if(keys['KeyS']) kz += 1;
            if(keys['KeyA']) kx -= 1; if(keys['KeyD']) kx += 1;

            const isWalking = (kx || kz || mv.x || mv.z);

            if(isWalking) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const speed = keys['ShiftLeft'] ? 0.22 : 0.13;
                const vel = new THREE.Vector3().addScaledVector(f, -kz || -mv.z).addScaledVector(r, kx || mv.x).setLength(speed);
                const next = camera.position.clone().add(vel);
                if(!colliders.some(c => new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(0.5,1.5,0.5)).intersectsBox(c.box))) camera.position.copy(next);
                bobTime += speed * 1.5;
                camera.position.y = 1.7 + Math.sin(bobTime) * 0.05;
            } else {
                camera.position.y = THREE.MathUtils.lerp(camera.position.y, 1.7, 0.1);
            }

            // ★Firebase節約ロジック: 動いた時か1秒おきにしか送らない
            const dist = camera.position.distanceTo(lastPos);
            const rotDist = Math.abs(camera.rotation.y - lastRot);
            if(t - lastSend > 100 && (dist > 0.05 || rotDist > 0.05 || (t - lastSend > 1000))) {
                set(myRef, { 
                    x: Math.round(camera.position.x * 100) / 100, 
                    y: Math.round(camera.position.y * 100) / 100, 
                    z: Math.round(camera.position.z * 100) / 100, 
                    ry: Math.round(camera.rotation.y * 100) / 100, 
                    walking: !!isWalking 
                });
                lastSend = t; lastPos.copy(camera.position); lastRot = camera.rotation.y;
            }

            otherPlayers.forEach((m) => {
                const u = m.userData;
                m.position.lerp(u.targetPos, 0.15);
                m.rotation.y = THREE.MathUtils.lerp(m.rotation.y, u.targetRot, 0.15);
                if(u.walking) {
                    u.rLegP.rotation.x = Math.sin(t * 0.01) * 0.5; u.lLegP.rotation.x = -Math.sin(t * 0.01) * 0.5;
                    u.rArmP.rotation.x = -Math.sin(t * 0.01) * 0.4; u.lArmP.rotation.x = Math.sin(t * 0.01) * 0.4;
                } else {
                    u.rLegP.rotation.x *= 0.8; u.lLegP.rotation.x *= 0.8;
                    u.rArmP.rotation.x *= 0.8; u.lArmP.rotation.x *= 0.8;
                }
            });

            const cx=Math.round(camera.position.x/8), cz=Math.round(camera.position.z/8);
            for(let i=cx-2; i<=cx+2; i++) for(let j=cz-2; j<=cz+2; j++) spawn(i,j);
            
            renderer.render(scene, camera);
            document.getElementById('timer').innerText = new Date(t).toISOString().substr(14, 8);
        }
        animate(0);
    </script>
</body>
</html>
