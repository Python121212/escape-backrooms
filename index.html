<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms MMO - Mobile Fix</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .vhs-text { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 11px; text-shadow: 1px 1px #000; }
        
        /* 建築ボタンUI - pointer-events: auto でクリック可能に */
        #build-menu { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; pointer-events: auto; z-index: 200; }
        .build-btn { width: 55px; height: 55px; background: rgba(0,255,0,0.1); border: 2px solid #0f0; color: #0f0; font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; }
        .active-btn { background: rgba(0,255,0,0.4); }

        /* ジョイスティック */
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 80px; height: 80px; border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; background: rgba(0,255,0,0.1); pointer-events: auto; z-index: 200; }
        #stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; background: #0f0; border-radius: 50%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; border-radius: 50%; margin: -2px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="vhs-text" id="status">REC ● <span id="timer">00:00:00</span><br>MOBILE OPTIMIZED<br>BUILD: <span id="current-item">NONE</span></div>
        <div id="crosshair"></div>
        <div id="build-menu">
            <div class="build-btn" id="btn-wall" onclick="setBuild('wall')">1:WALL</div>
            <div class="build-btn" id="btn-glass" onclick="setBuild('glass')">2:GLASS</div>
            <div class="build-btn" id="btn-shutter" onclick="setBuild('shutter')">3:SHUTTER</div>
        </div>
    </div>
    <div id="joy-base"><div id="stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, push, onValue, onChildAdded, onDisconnect } from 'firebase/database';

        const firebaseConfig = {
            apiKey: "AIzaSyDknkrM78uvtu5BfAYsuJCa-oRB2rfH3HQ",
            authDomain: "backrooms-mmo.firebaseapp.com",
            databaseURL: "https://backrooms-mmo-default-rtdb.firebaseio.com",
            projectId: "backrooms-mmo",
            storageBucket: "backrooms-mmo.firebasestorage.app",
            messagingSenderId: "64360079618",
            appId: "1:64360079618:web:240178c335c04cd373621b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myId = sessionStorage.getItem('backrooms_id') || "A-SYNC_" + Math.random().toString(36).substring(7);
        const myRef = ref(db, 'players/' + myId);
        const buildRef = ref(db, 'builds');

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a00);
        scene.fog = new THREE.Fog(0x1a1a00, 1, 20);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
        camera.position.set(0, 1.7, 0); camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
        document.body.appendChild(renderer.domElement);

        const flashLight = new THREE.SpotLight(0xffffff, 10, 15, Math.PI/6, 0.5, 1);
        camera.add(flashLight); flashLight.target.position.set(0,0,-1); camera.add(flashLight.target);
        scene.add(camera); scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        const colliders = [], chunks = new Map(), otherPlayers = new Map();
        const mats = {
            wall: new THREE.MeshLambertMaterial({ color: 0xddcc66 }),
            glass: new THREE.MeshLambertMaterial({ color: 0x88aabb, transparent: true, opacity: 0.3 }),
            shutter: new THREE.MeshLambertMaterial({ color: 0x666666, side: THREE.DoubleSide })
        };

        // 建築プレビュー
        const previewMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 0.2), new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.5 }));
        previewMesh.visible = false; scene.add(previewMesh);
        let buildType = null;

        window.setBuild = (type) => {
            buildType = (buildType === type) ? null : type;
            document.getElementById('current-item').innerText = buildType ? buildType.toUpperCase() : "NONE";
            previewMesh.visible = !!buildType;
            document.querySelectorAll('.build-btn').forEach(b => b.classList.remove('active-btn'));
            if(buildType) document.getElementById('btn-' + type).classList.add('active-btn');
        };

        onChildAdded(buildRef, (snap) => {
            const data = snap.val();
            const m = new THREE.Mesh(new THREE.BoxGeometry(data.w || 2, 4, 0.2), mats[data.type]);
            m.position.set(data.x, 2, data.z); m.rotation.y = data.ry; scene.add(m);
            colliders.push({ box: new THREE.Box3().setFromObject(m) });
        });

        const placeBuild = () => {
            if (!buildType) return;
            push(buildRef, { type: buildType, x: previewMesh.position.x, z: previewMesh.position.z, ry: previewMesh.rotation.y, w: 2 });
        };

        // タッチ操作ロジック
        let moveId = null, lookId = null, lastL = { x: 0, y: 0 }, mv = { x: 0, z: 0 };
        const joyBase = document.getElementById('joy-base'), st = document.getElementById('stick');

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                const r = joyBase.getBoundingClientRect();
                // ジョイスティック判定
                if (t.clientX >= r.left && t.clientX <= r.right && t.clientY >= r.top && t.clientY <= r.bottom) {
                    moveId = t.identifier;
                } else {
                    // 建築ボタン以外を触ったなら視点移動（または建築）
                    if (!e.target.classList.contains('build-btn')) {
                        if (buildType) placeBuild(); // 建築モードなら設置
                        if (lookId === null) {
                            lookId = t.identifier;
                            lastL = { x: t.clientX, y: t.clientY };
                        }
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.touches) {
                if (t.identifier === moveId) {
                    const r = joyBase.getBoundingClientRect();
                    const dx = t.clientX - (r.left + 40), dy = t.clientY - (r.top + 40);
                    const d = Math.min(35, Math.sqrt(dx * dx + dy * dy)), a = Math.atan2(dy, dx);
                    mv = { x: Math.cos(a) * (d / 35), z: Math.sin(a) * (d / 35) };
                    st.style.transform = `translate(${Math.cos(a) * d}px, ${Math.sin(a) * d}px)`;
                } else if (t.identifier === lookId) {
                    camera.rotation.y -= (t.clientX - lastL.x) * 0.007;
                    camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - (t.clientY - lastL.y) * 0.007));
                    lastL = { x: t.clientX, y: t.clientY };
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveId) { moveId = null; mv = { x: 0, z: 0 }; st.style.transform = 'none'; }
                if (t.identifier === lookId) lookId = null;
            }
        });

        // PC用操作
        let keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'Digit1') setBuild('wall');
            if(e.code === 'Digit2') setBuild('glass');
            if(e.code === 'Digit3') setBuild('shutter');
            if(e.code === 'Space' && camera.position.y <= 1.71) velocityY = 0.2;
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        renderer.domElement.addEventListener('mousedown', () => {
            if (document.pointerLockElement) { if(buildType) placeBuild(); }
            else renderer.domElement.requestPointerLock();
        });
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.002));
            }
        });

        // 自動生成
        function spawn(cx, cz) {
            const k = `${cx},${cz}`; if(chunks.has(k)) return;
            const g = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0x9a8c62})); floor.rotation.x=-Math.PI/2; g.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(8,8), mats.wall); ceil.rotation.x=Math.PI/2; ceil.position.y=4; g.add(ceil);
            if(Math.abs(cx%2)===1 && Math.abs(cz%2)===1) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(1,4,1), mats.wall); p.position.y=2; g.add(p);
                colliders.push({box: new THREE.Box3().setFromObject(p).translate(new THREE.Vector3(cx*8,0,cz*8))});
            }
            if(Math.abs(Math.sin(cx*1.3+cz*0.7)) > 0.85) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8,4,0.1), mats.wall); w.position.set(0,2,4); g.add(w);
                colliders.push({box: new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(cx*8,0,cz*8))});
            }
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(k, g);
        }

        let velocityY = 0, lastSend = 0;
        function animate(t) {
            requestAnimationFrame(animate);
            let kx = 0, kz = 0;
            if(keys['KeyW']) kz -= 1; if(keys['KeyS']) kz += 1;
            if(keys['KeyA']) kx -= 1; if(keys['KeyD']) kx += 1;
            
            velocityY -= 0.012; camera.position.y += velocityY;
            if (camera.position.y < 1.7) { camera.position.y = 1.7; velocityY = 0; }
            
            if(kx || kz || mv.x || mv.z) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const speed = (keys['ShiftLeft']) ? 0.2 : 0.12;
                const vel = new THREE.Vector3().addScaledVector(f, -kz || -mv.z).addScaledVector(r, kx || mv.x).setLength(speed);
                const next = camera.position.clone().add(vel);
                if(!colliders.some(c => new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(0.6,1.8,0.6)).intersectsBox(c.box))) camera.position.copy(next);
            }

            if (buildType) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                const target = camera.position.clone().add(dir.multiplyScalar(3));
                previewMesh.position.set(Math.round(target.x), 2, Math.round(target.z));
                previewMesh.rotation.y = Math.round(camera.rotation.y / (Math.PI/2)) * (Math.PI/2);
            }

            if(t - lastSend > 100) {
                set(myRef, { x: Math.round(camera.position.x*10)/10, y: camera.position.y, z: Math.round(camera.position.z*10)/10, ry: camera.rotation.y });
                lastSend = t;
            }
            const cx=Math.round(camera.position.x/8), cz=Math.round(camera.position.z/8);
            for(let i=cx-2; i<=cx+2; i++) for(let j=cz-2; j<=cz+2; j++) spawn(i,j);
            renderer.render(scene, camera);
        }
        animate(0);
    </script>
</body>
</html>
