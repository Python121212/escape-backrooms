<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms - Fix Movement</title>
    <style>
        body { margin: 0; overflow: hidden; background: #dac05e; touch-action: none; font-family: monospace; }
        #ui-container { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 20px; box-sizing: border-box; }
        .btn { pointer-events: auto; padding: 15px; background: rgba(0,0,0,0.8); color: white; border: 2px solid #fff; border-radius: 8px; font-size: 14px; margin-bottom: 10px; min-width: 150px; font-weight: bold; }
        /* スティックの外枠 */
        #move-zone { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid rgba(0,0,0,0.3); pointer-events: auto; z-index: 200; }
        /* 動くスティック本体 */
        #stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; background: rgba(0,0,0,0.5); border-radius: 50%; pointer-events: none; }
    </style>
</head>
<body>
    <div id="move-zone"><div id="stick"></div></div>
    <div id="ui-container">
        <button id="build-btn" class="btn" style="background: #e6b400; color: #000;">B - BUILD</button>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdac05e);
        scene.fog = new THREE.Fog(0xdac05e, 1, 35);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.7, 0);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const mainLight = new THREE.PointLight(0xffffee, 1.0, 15);
        scene.add(mainLight);

        const wallMat = new THREE.MeshLambertMaterial({ color: 0xccbb55 });
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x8a7c52 });
        const ceilMat = new THREE.MeshLambertMaterial({ color: 0xdac05e });
        const lampMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

        const chunks = new Map();
        const colliders = [];

        function spawnChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks.has(key)) return;

            const group = new THREE.Group();
            // 床
            const f = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), floorMat);
            f.rotation.x = -Math.PI / 2; group.add(f);
            // 天井
            const c = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), ceilMat);
            c.rotation.x = Math.PI / 2; c.position.y = 4; group.add(c);
            // 蛍光灯
            const l = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.01, 2), lampMat);
            l.position.set(0, 3.99, 0); group.add(l);

            const seed = Math.abs(Math.sin(cx * 12.9 + cz * 78.2) * 437) % 1;
            if (seed > 0.8) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 0.5), wallMat);
                w.position.set(0, 2, 4); group.add(w);
                colliders.push({ box: new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(cx*8, 0, cz*8)) });
            }

            group.position.set(cx * 8, 0, cz * 8);
            scene.add(group);
            chunks.set(key, group);
        }

        // --- PC移動管理 ---
        const keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // --- スマホ移動管理 (スティック) ---
        let moveVec = { x: 0, z: 0 };
        const moveZone = document.getElementById('move-zone');
        const stick = document.getElementById('stick');

        moveZone.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            const r = moveZone.getBoundingClientRect();
            updateStick(touch.clientX, touch.clientY, r);
        });

        moveZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            const r = moveZone.getBoundingClientRect();
            updateStick(touch.clientX, touch.clientY, r);
        }, { passive: false });

        moveZone.addEventListener('touchend', () => {
            moveVec = { x: 0, z: 0 };
            stick.style.transform = `translate(0px, 0px)`;
        });

        function updateStick(tx, ty, r) {
            const dx = tx - (r.left + 50);
            const dy = ty - (r.top + 50);
            const dist = Math.min(40, Math.sqrt(dx*dx + dy*dy));
            const angle = Math.atan2(dy, dx);
            moveVec = { x: Math.cos(angle) * (dist / 40), z: Math.sin(angle) * (dist / 40) };
            stick.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px)`;
        }

        // --- カメラ回転 ---
        window.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.003));
            }
        });
        renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();

        // スマホ視点移動 (右半分)
        let lastTouch = null;
        window.addEventListener('touchstart', (e) => {
            if (e.touches[0].clientX > window.innerWidth / 2) {
                lastTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            }
        });
        window.addEventListener('touchmove', (e) => {
            if (lastTouch) {
                const t = e.touches[0];
                camera.rotation.y -= (t.clientX - lastTouch.x) * 0.005;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - (t.clientY - lastTouch.y) * 0.005));
                lastTouch = { x: t.clientX, y: t.clientY };
            }
        });
        window.addEventListener('touchend', () => lastTouch = null);

        function animate() {
            requestAnimationFrame(animate);

            // 移動計算
            let vx = 0, vz = 0;
            if (keys['KeyW']) vz = -1; if (keys['KeyS']) vz = 1;
            if (keys['KeyA']) vx = -1; if (keys['KeyD']) vx = 1;
            if (moveVec.x !== 0 || moveVec.z !== 0) { vx = moveVec.x; vz = moveVec.z; }

            if (vx !== 0 || vz !== 0) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const vel = new THREE.Vector3().addScaledVector(f, -vz).addScaledVector(r, vx).setLength(0.12);
                
                const nextPos = camera.position.clone().add(vel);
                const pBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(0.6, 1.8, 0.6));
                if (!colliders.some(c => pBox.intersectsBox(c.box))) {
                    camera.position.copy(nextPos);
                }
            }

            mainLight.position.copy(camera.position);

            const cx = Math.round(camera.position.x / 8);
            const cz = Math.round(camera.position.z / 8);
            for(let i=cx-4; i<=cx+4; i++) for(let j=cz-4; j<=cz+4; j++) spawnChunk(i, j);

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
