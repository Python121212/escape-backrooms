<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms - Precise Control</title>
    <style>
        body { margin: 0; overflow: hidden; background: #dac05e; touch-action: none; font-family: monospace; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .controls { position: absolute; bottom: 20px; right: 20px; display: flex; flex-direction: column; align-items: flex-end; pointer-events: none; }
        .btn { pointer-events: auto; padding: 12px; background: rgba(0,0,0,0.8); color: white; border: 2px solid #fff; border-radius: 8px; font-weight: bold; margin-top: 8px; min-width: 120px; }
        #move-zone { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid rgba(0,0,0,0.3); z-index: 500; pointer-events: auto; }
        #stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; background: rgba(0,0,0,0.6); border-radius: 50%; pointer-events: none; transition: transform 0.1s ease-out; }
    </style>
</head>
<body>
    <div id="move-zone"><div id="stick"></div></div>
    <div id="ui-layer">
        <div class="controls">
            <button id="place-btn" class="btn" style="display:none; background: #28a745;">PLACE</button>
            <button id="build-btn" class="btn" style="background: #e6b400; color: #000;">B - BUILD</button>
        </div>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdac05e);
        scene.fog = new THREE.Fog(0xdac05e, 1, 35);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.7, 0);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const mainLight = new THREE.PointLight(0xffffee, 1.2, 15);
        scene.add(mainLight);

        const wallMat = new THREE.MeshLambertMaterial({ color: 0xccbb55 });
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x8a7c52 });
        const ceilMat = new THREE.MeshLambertMaterial({ color: 0xdac05e });
        const chunks = new Map(), colliders = [];

        function spawnChunk(cx, cz) {
            const key = `${cx},${cz}`; if (chunks.has(key)) return;
            const g = new THREE.Group();
            const f = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), floorMat); f.rotation.x = -Math.PI/2; g.add(f);
            const c = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), ceilMat); c.rotation.x = Math.PI/2; c.position.y = 4; g.add(c);
            if (Math.abs(Math.sin(cx*12.9 + cz*78.2)) > 0.85) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 0.5), wallMat); w.position.set(0, 2, 4); g.add(w);
                colliders.push({ box: new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(cx*8, 0, cz*8)) });
            }
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(key, g);
        }

        // --- 移動制御（デッドゾーン導入） ---
        let moveVec = { x: 0, z: 0 };
        let moveTouchId = null, lookTouchId = null, lastLookPos = { x: 0, y: 0 };
        const DEADZONE = 0.15; // 15%以下の小さな動きは無視する

        const moveZone = document.getElementById('move-zone');
        const stick = document.getElementById('stick');

        function updateJoystick(tx, ty) {
            const r = moveZone.getBoundingClientRect();
            const centerX = r.left + r.width / 2;
            const centerY = r.top + r.height / 2;
            const dx = tx - centerX;
            const dy = ty - centerY;
            const dist = Math.sqrt(dx*dx + dy*dy);
            const maxDist = r.width / 2;
            
            const normalizedDist = Math.min(1, dist / maxDist);
            const angle = Math.atan2(dy, dx);

            if (normalizedDist < DEADZONE) {
                moveVec = { x: 0, z: 0 };
            } else {
                // デッドゾーンを引いてから再計算することで滑らかに開始
                const power = (normalizedDist - DEADZONE) / (1 - DEADZONE);
                moveVec = { x: Math.cos(angle) * power, z: Math.sin(angle) * power };
            }
            
            const visualDist = Math.min(maxDist - 10, dist);
            stick.style.transform = `translate(${Math.cos(angle) * visualDist}px, ${Math.sin(angle) * visualDist}px)`;
        }

        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.target === moveZone) {
                    moveTouchId = t.identifier;
                    updateJoystick(t.clientX, t.clientY);
                } else if (t.clientX > window.innerWidth / 2) {
                    lookTouchId = t.identifier;
                    lastLookPos = { x: t.clientX, y: t.clientY };
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) {
                    updateJoystick(t.clientX, t.clientY);
                } else if (t.identifier === lookTouchId) {
                    const dx = t.clientX - lastLookPos.x;
                    const dy = t.clientY - lastLookPos.y;
                    camera.rotation.y -= dx * 0.005;
                    camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - dy * 0.005));
                    lastLookPos = { x: t.clientX, y: t.clientY };
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) {
                    moveTouchId = null;
                    moveVec = { x: 0, z: 0 }; // 離した瞬間に確実にリセット
                    stick.style.transform = `translate(0px, 0px)`;
                } else if (t.identifier === lookTouchId) {
                    lookTouchId = null;
                }
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            if (moveVec.x !== 0 || moveVec.z !== 0) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const vel = new THREE.Vector3().addScaledVector(f, -moveVec.z).addScaledVector(r, moveVec.x).setLength(0.12);
                const nextPos = camera.position.clone().add(vel);
                if (!colliders.some(c => new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(0.6, 1.8, 0.6)).intersectsBox(c.box))) {
                    camera.position.copy(nextPos);
                }
            }
            mainLight.position.copy(camera.position);
            const cx = Math.round(camera.position.x / 8), cz = Math.round(camera.position.z / 8);
            for(let i=cx-4; i<=cx+4; i++) for(let j=cz-4; j<=cz+4; j++) spawnChunk(i, j);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
