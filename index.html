<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms MMO - Build Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); image-rendering: pixelated; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .vhs-text { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 11px; text-shadow: 1px 1px #000; line-height: 1.4; }
        
        /* 建築ボタンUI */
        #build-menu { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; pointer-events: auto; }
        .build-btn { width: 60px; height: 60px; background: rgba(0,255,0,0.1); border: 2px solid #0f0; color: #0f0; font-size: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; text-align: center; }
        .build-btn.active { background: #0f0; color: #000; }

        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 80px; height: 80px; border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; background: rgba(0,255,0,0.1); z-index: 1000; pointer-events: auto; }
        #stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; background: #0f0; border-radius: 50%; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; border-radius: 50%; margin: -2px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="vhs-text" id="status">REC ● <span id="timer">00:00:00</span><br>BUILD MODE: <span id="current-item">NONE</span></div>
        <div id="crosshair"></div>
        <div id="build-menu">
            <div class="build-btn" onclick="setBuild('wall')">1:WALL</div>
            <div class="build-btn" onclick="setBuild('glass')">2:GLASS</div>
            <div class="build-btn" onclick="setBuild('shutter')">3:SHUTTER</div>
        </div>
    </div>
    <div id="joy-base"><div id="stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, push, onValue, onChildAdded, onChildRemoved, onDisconnect } from 'firebase/database';

        const firebaseConfig = {
            apiKey: "AIzaSyDknkrM78uvtu5BfAYsuJCa-oRB2rfH3HQ",
            authDomain: "backrooms-mmo.firebaseapp.com",
            databaseURL: "https://backrooms-mmo-default-rtdb.firebaseio.com",
            projectId: "backrooms-mmo",
            storageBucket: "backrooms-mmo.firebasestorage.app",
            messagingSenderId: "64360079618",
            appId: "1:64360079618:web:240178c335c04cd373621b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const myId = sessionStorage.getItem('backrooms_id') || "A-SYNC_" + Math.random().toString(36).substring(7);
        sessionStorage.setItem('backrooms_id', myId);
        const myRef = ref(db, 'players/' + myId);
        const buildRef = ref(db, 'builds');

        // Scene Setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a00);
        scene.fog = new THREE.Fog(0x1a1a00, 1, 25);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.7, 5); camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio > 1 ? 0.7 : 1);
        document.body.appendChild(renderer.domElement);

        const flashLight = new THREE.SpotLight(0xffffff, 15, 20, Math.PI/6, 0.5, 1);
        camera.add(flashLight); flashLight.target.position.set(0,0,-1); camera.add(flashLight.target);
        scene.add(camera); scene.add(new THREE.AmbientLight(0xffffff, 0.2));

        const colliders = [], chunks = new Map(), otherPlayers = new Map();

        // 建築マテリアル
        const mats = {
            wall: new THREE.MeshLambertMaterial({ color: 0xddcc66 }),
            glass: new THREE.MeshLambertMaterial({ color: 0x88aabb, transparent: true, opacity: 0.3 }),
            shutter: new THREE.MeshLambertMaterial({ color: 0x666666, side: THREE.DoubleSide })
        };

        // プレビュー用オブジェクト
        const previewMesh = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 0.2), new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true, transparent: true, opacity: 0.5 }));
        scene.add(previewMesh);
        let buildType = null;

        window.setBuild = (type) => {
            buildType = (buildType === type) ? null : type;
            document.getElementById('current-item').innerText = buildType ? buildType.toUpperCase() : "NONE";
            previewMesh.visible = !!buildType;
        };

        // 建築物の受信
        onChildAdded(buildRef, (snap) => {
            const data = snap.val();
            const geo = new THREE.BoxGeometry(data.w || 2, 4, 0.2);
            const m = new THREE.Mesh(geo, mats[data.type]);
            m.position.set(data.x, 2, data.z);
            m.rotation.y = data.ry;
            scene.add(m);
            colliders.push({ box: new THREE.Box3().setFromObject(m) });
        });

        // 建築実行
        const placeBuild = () => {
            if (!buildType) return;
            push(buildRef, {
                type: buildType,
                x: previewMesh.position.x,
                z: previewMesh.position.z,
                ry: previewMesh.rotation.y,
                w: 2
            });
        };

        // アバター作成
        function createPlayerModel() {
            const group = new THREE.Group();
            const container = new THREE.Group(); group.add(container);
            const hazmatMat = new THREE.MeshLambertMaterial({ color: 0xcccc55 });
            const body = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.32, 1.0, 8), hazmatMat);
            body.position.y = 0.8; container.add(body);
            const head = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.22, 0.45, 8), hazmatMat);
            head.position.y = 1.45; container.add(head);
            container.rotation.y = Math.PI;
            group.userData = { targetPos: new THREE.Vector3(), targetRot: 0, walking: false };
            return group;
        }

        onDisconnect(myRef).remove();
        onValue(ref(db, 'players'), (snapshot) => {
            const data = snapshot.val(); if(!data) return;
            for (let id in data) {
                if (id === myId) continue;
                if (!otherPlayers.has(id)) {
                    const m = createPlayerModel(); scene.add(m); otherPlayers.set(id, m);
                }
                const m = otherPlayers.get(id); const p = data[id];
                m.userData.targetPos.set(p.x, p.y - 1.7, p.z);
                m.userData.targetRot = p.ry;
            }
        });

        // 操作系
        const canvas = renderer.domElement;
        canvas.addEventListener('mousedown', (e) => {
            if (document.pointerLockElement === canvas && buildType) placeBuild();
            else if (!document.pointerLockElement) canvas.requestPointerLock();
        });

        let keys = {};
        window.addEventListener('keydown', (e) => {
            keys[e.code] = true;
            if(e.code === 'Digit1') setBuild('wall');
            if(e.code === 'Digit2') setBuild('glass');
            if(e.code === 'Digit3') setBuild('shutter');
            if(e.code === 'Space' && camera.position.y <= 1.71) velocityY = 0.2;
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement === canvas) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.002));
            }
        });

        function spawn(cx, cz) {
            const k = `${cx},${cz}`; if(chunks.has(k)) return;
            const g = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0x9a8c62})); floor.rotation.x=-Math.PI/2; g.add(floor);
            const ceil = new THREE.Mesh(new THREE.PlaneGeometry(8,8), mats.wall); ceil.rotation.x=Math.PI/2; ceil.position.y=4; g.add(ceil);
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(k, g);
        }

        let velocityY = 0, lastSend = 0, lastPos = new THREE.Vector3();
        function animate(t) {
            requestAnimationFrame(animate);
            let kx = 0, kz = 0;
            if(keys['KeyW']) kz -= 1; if(keys['KeyS']) kz += 1;
            if(keys['KeyA']) kx -= 1; if(keys['KeyD']) kx += 1;

            velocityY -= 0.012; camera.position.y += velocityY;
            if (camera.position.y < 1.7) { camera.position.y = 1.7; velocityY = 0; }

            if(kx || kz) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const vel = new THREE.Vector3().addScaledVector(f, -kz).addScaledVector(r, kx).setLength(0.13);
                const next = camera.position.clone().add(vel);
                if(!colliders.some(c => new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(0.6,1.8,0.6)).intersectsBox(c.box))) camera.position.copy(next);
            }

            // 建築プレビューの更新
            if (buildType) {
                const dir = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion);
                const target = camera.position.clone().add(dir.multiplyScalar(3));
                previewMesh.position.set(Math.round(target.x), 2, Math.round(target.z));
                previewMesh.rotation.y = Math.round(camera.rotation.y / (Math.PI/2)) * (Math.PI/2);
            }

            if(t - lastSend > 100) {
                set(myRef, { x: Math.round(camera.position.x*10)/10, y: camera.position.y, z: Math.round(camera.position.z*10)/10, ry: camera.rotation.y });
                lastSend = t;
            }

            otherPlayers.forEach(m => {
                m.position.lerp(m.userData.targetPos, 0.2);
                m.rotation.y = THREE.MathUtils.lerp(m.rotation.y, m.userData.targetRot, 0.15);
            });

            const cx=Math.round(camera.position.x/8), cz=Math.round(camera.position.z/8);
            for(let i=cx-2; i<=cx+2; i++) for(let j=cz-2; j<=cz+2; j++) spawn(i,j);
            renderer.render(scene, camera);
        }
        animate(0);
    </script>
</body>
</html>
