<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Backrooms - VHS Lite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { filter: contrast(1.3) brightness(0.8) sepia(0.3); image-rendering: pixelated; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; color: #0f0; font-family: monospace; }
        .vhs-text { position: absolute; top: 20px; left: 20px; font-size: 20px; text-shadow: 2px 2px #000; }
        .controls { position: absolute; bottom: 20px; right: 20px; pointer-events: none; display: flex; flex-direction: column; }
        .btn { pointer-events: auto; padding: 15px; background: rgba(0,20,0,0.8); color: #0f0; border: 1px solid #0f0; margin-top: 10px; font-size: 12px; min-width: 120px; }
        #joy { position: absolute; bottom: 40px; left: 40px; width: 80px; height: 80px; border: 1px solid #0f0; border-radius: 50%; pointer-events: auto; }
        #stick { position: absolute; top: 20px; left: 20px; width: 40px; height: 40px; background: #0f0; border-radius: 50%; opacity: 0.4; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="vhs-text">REC ●<br><span id="timer">00:00:00</span></div>
        <div class="controls">
            <button id="action-btn" class="btn" style="display:none;">INTERACT</button>
            <button id="place-btn" class="btn" style="display:none;">PLACE</button>
            <button id="type-btn" class="btn" style="display:none;">WALL</button>
            <button id="build-btn" class="btn">BUILD MODE</button>
        </div>
    </div>
    <div id="joy"><div id="stick"></div></div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>
    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.fog = new THREE.Fog(0x1a1a00, 1, 20);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(0.3); // 超低解像度で軽量化
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 1.5, 15);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        const wallTypes = [{n:'SHUTTER', c:0xcccccc, s:true}, {n:'GLASS', c:0x88ccff, o:0.4}, {n:'IRON', c:0x333333}, {n:'WALL', c:0xccbb55}];
        let typeIdx = 0, isBuild = false;
        const colliders = [], shutters = [], chunks = new Map();
        const ghost = new THREE.Mesh(new THREE.BoxGeometry(4,4,0.4), new THREE.MeshBasicMaterial({color:0x00ff00, transparent:true, opacity:0.3}));
        ghost.visible = false; scene.add(ghost);

        function addObj(pos, rot, idx) {
            const t = wallTypes[idx];
            const m = new THREE.Mesh(new THREE.BoxGeometry(4,4,0.4), new THREE.MeshLambertMaterial({color:t.c, transparent:!!t.o, opacity:t.o||1}));
            m.position.copy(pos); m.rotation.y = rot; scene.add(m);
            const col = { box: new THREE.Box3().setFromObject(m), m };
            colliders.push(col);
            if(t.s) shutters.push({ m, col, open:false, ty:pos.y, iy:pos.y, moving:false });
        }

        function spawn(cx, cz) {
            const k = `${cx},${cz}`; if(chunks.has(k)) return;
            const g = new THREE.Group();
            // 床と天井（1枚の板で描画）
            const f = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0x8a7c52}));
            f.rotation.x=-Math.PI/2; g.add(f);
            const c = f.clone(); c.rotation.x=Math.PI/2; c.position.y=4; g.add(c);
            
            // 簡易的な壁生成
            if(Math.abs(Math.sin(cx*12+cz*7)) > 0.7) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8,4,0.3), new THREE.MeshLambertMaterial({color:0xccbb55}));
                w.position.set(0,2,4); g.add(w);
                colliders.push({box: new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(cx*8,0,cz*8))});
            }
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(k, g);
        }

        // --- Input ---
        let mv = {x:0, z:0}, lookId = null, lastL = {x:0, y:0};
        const joy = document.getElementById('joy'), st = document.getElementById('stick');
        joy.addEventListener('touchstart', (e) => e.preventDefault(), {passive:false});
        joy.addEventListener('touchmove', (e) => {
            const t = e.touches[0], r = joy.getBoundingClientRect();
            const dx = t.clientX-(r.left+40), dy = t.clientY-(r.top+40);
            const d = Math.min(30, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy,dx);
            mv = {x: Math.cos(a)*(d/30), z: Math.sin(a)*(d/30)};
            st.style.transform = `translate(${Math.cos(a)*d}px,${Math.sin(a)*d}px)`;
        }, {passive:false});
        window.addEventListener('touchend', () => { mv={x:0,z:0}; st.style.transform='none'; lookId=null; });
        window.addEventListener('touchstart', (e) => { if(e.touches[0].clientX > window.innerWidth/2) { lookId=e.touches[0].identifier; lastL={x:e.touches[0].clientX, y:e.touches[0].clientY}; }});
        window.addEventListener('touchmove', (e) => {
            const t = Array.from(e.touches).find(v => v.identifier === lookId);
            if(t) { camera.rotation.y -= (t.clientX-lastL.x)*0.005; camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x-(t.clientY-lastL.y)*0.005)); lastL={x:t.clientX, y:t.clientY}; }
        });

        // --- UI ---
        document.getElementById('build-btn').onclick = () => { isBuild=!isBuild; ghost.visible=isBuild; document.getElementById('place-btn').style.display = document.getElementById('type-btn').style.display = isBuild?'block':'none'; };
        document.getElementById('type-btn').onclick = () => { typeIdx=(typeIdx+1)%wallTypes.length; document.getElementById('type-btn').innerText=wallTypes[typeIdx].n; };
        document.getElementById('place-btn').onclick = () => { if(isBuild) addObj(ghost.position.clone(), ghost.rotation.y, typeIdx); };
        document.getElementById('action-btn').onclick = () => {
            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));
            const hit = shutters.find(s => ray.ray.distanceToPoint(s.m.position) < 3);
            if(hit && !hit.moving) { hit.open=!hit.open; hit.ty = hit.open?hit.iy+3.5:hit.iy; hit.moving=true; }
        };

        function animate(t) {
            requestAnimationFrame(animate);
            const time = t * 0.001;
            document.getElementById('timer').innerText = new Date(t).toISOString().substr(14, 8);

            if(mv.x || mv.z) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const vel = new THREE.Vector3().addScaledVector(f, -mv.z).addScaledVector(r, mv.x).setLength(0.1);
                const next = camera.position.clone().add(vel);
                if(!colliders.some(c => new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(0.5,1.5,0.5)).intersectsBox(c.box))) camera.position.copy(next);
                // 手ブレ
                camera.position.y = 1.6 + Math.sin(time*10)*0.02;
            }

            shutters.forEach(s => { if(s.moving){ s.m.position.y += (s.ty-s.m.position.y)*0.1; s.col.box.setFromObject(s.m); if(Math.abs(s.ty-s.m.position.y)<0.01) s.moving=false; }});
            
            if(isBuild) {
                const f = new THREE.Vector3(0,0,-4).applyQuaternion(camera.quaternion);
                ghost.position.set(Math.round((camera.position.x+f.x)/2)*2, 2, Math.round((camera.position.z+f.z)/2)*2);
                ghost.rotation.y = Math.round(camera.rotation.y/(Math.PI/2))*(Math.PI/2);
            }

            const cx=Math.round(camera.position.x/8), cz=Math.round(camera.position.z/8);
            for(let i=cx-2; i<=cx+2; i++) for(let j=cz-2; j<=cz+2; j++) spawn(i,j);

            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));
            document.getElementById('action-btn').style.display = shutters.some(s => ray.ray.distanceToPoint(s.m.position)<3)?'block':'none';
            light.position.copy(camera.position);
            renderer.render(scene, camera);
        }
        animate(0);
    </script>
</body>
</html>
