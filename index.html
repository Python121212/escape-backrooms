<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms - PC & Mobile Hybrid</title>
    <style>
        body { margin: 0; overflow: hidden; background: #dac05e; touch-action: none; font-family: monospace; }
        #ui-container { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 20px; box-sizing: border-box; }
        .btn { pointer-events: auto; padding: 15px; background: rgba(0,0,0,0.85); color: white; border: 2px solid #fff; border-radius: 8px; font-size: 14px; margin-bottom: 10px; min-width: 160px; font-weight: bold; text-align: center; }
        #build-btn { background: #e6b400; color: #000; }
        #action-btn { background: #ff4757; display: none; min-height: 60px; font-size: 18px; }
        #move-zone { position: absolute; bottom: 30px; left: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; border: 1px solid rgba(0,0,0,0.2); pointer-events: auto; }
        #stick { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; margin: -15px; background: rgba(0,0,0,0.4); border-radius: 50%; }
        #pc-hint { position: absolute; top: 10px; left: 10px; color: #555; font-size: 12px; pointer-events: none; background: rgba(255,255,255,0.5); padding: 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="pc-hint">PC: WASD移動 / Mouse視点 / Eキーで操作</div>
    <div id="move-zone"><div id="stick"></div></div>
    <div id="ui-container">
        <button id="action-btn" class="btn">E - OPEN/CLOSE</button>
        <button id="place-btn" class="btn" style="display:none; background: #28a745;">PLACE (Space)</button>
        <button id="type-btn" class="btn" style="display:none; background: #007bff;">TYPE: SHUTTER</button>
        <button id="build-btn" class="btn">B - BUILD MODE</button>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        const bgColor = 0xdac05e;
        scene.background = new THREE.Color(bgColor);
        scene.fog = new THREE.Fog(bgColor, 1, 80);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.7, 5);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.7));
        const light = new THREE.PointLight(0xffffff, 1.5, 30);
        scene.add(light);

        const colliders = [], shutters = [];
        const wallMat = new THREE.MeshLambertMaterial({ color: 0xccbb55 });
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x8a7c52 });
        const boxMat = new THREE.MeshLambertMaterial({ color: 0x444444 });
        const wallGeo = new THREE.BoxGeometry(4, 4, 0.4);
        const boxGeo = new THREE.BoxGeometry(4.2, 0.8, 0.8);

        const wallTypes = [{ name: 'SHUTTER', color: 0xcccccc }, { name: 'IRON', color: 0x333333 }, { name: 'GLASS', color: 0x88ccff, opacity: 0.4 }];

        function createWall(pos, rot, typeIdx) {
            const t = wallTypes[typeIdx];
            const m = new THREE.MeshLambertMaterial({ color: t.color, transparent: !!t.opacity, opacity: t.opacity || 1 });
            const w = new THREE.Mesh(wallGeo, m);
            w.position.copy(pos); w.rotation.y = rot;
            scene.add(w);

            if (t.name === 'SHUTTER') {
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.set(pos.x, pos.y + 2.1, pos.z); box.rotation.y = rot;
                scene.add(box);
                shutters.push({ mesh: w, isOpen: false, targetY: pos.y, velY: 0, isMoving: false, initialY: pos.y });
            }
            colliders.push({ box: new THREE.Box3().setFromObject(w), mesh: w });
        }

        const chunkSize = 8, chunks = new Map();
        function spawnChunk(cx, cz) {
            const key = `${cx},${cz}`; if (chunks.has(key)) return;
            const group = new THREE.Group();
            const f = new THREE.Mesh(new THREE.PlaneGeometry(chunkSize, chunkSize), floorMat);
            f.rotation.x = -Math.PI/2; group.add(f);
            
            const seed = Math.abs(Math.sin(cx * 12.9 + cz * 78.2) * 437) % 1;
            if ((Math.abs(cx) > 2 || Math.abs(cz) > 2) && seed > 0.8) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(chunkSize, 4, 0.6), wallMat);
                w.position.set(0, 2, chunkSize/2); group.add(w);
                colliders.push({ box: new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(cx*chunkSize, 0, cz*chunkSize)) });
            }
            group.position.set(cx*chunkSize, 0, cz*chunkSize); scene.add(group); chunks.set(key, group);
        }

        // --- 入力制御 (PC & Mobile) ---
        let keys = {}, isBuildMode = false, currentType = 0;
        window.addEventListener('keydown', (e) => { 
            keys[e.code] = true; 
            if(e.code === 'KeyE') triggerAction();
            if(e.code === 'KeyB') toggleBuildMode();
            if(e.code === 'Space' && isBuildMode) placeObject();
        });
        window.addEventListener('keyup', (e) => keys[e.code] = false);
        window.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.002;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.002));
            }
        });
        renderer.domElement.addEventListener('click', () => renderer.domElement.requestPointerLock());

        // --- UIアクション ---
        const buildBtn = document.getElementById('build-btn'), actionBtn = document.getElementById('action-btn'), placeBtn = document.getElementById('place-btn'), typeBtn = document.getElementById('type-btn');
        function toggleBuildMode() { isBuildMode = !isBuildMode; ghost.visible = isBuildMode; typeBtn.style.display = placeBtn.style.display = isBuildMode ? 'block' : 'none'; }
        function placeObject() { if (ghost.visible && ghost.material.color.getHex() === 0x00ff00) createWall(ghost.position.clone(), ghost.rotation.y, currentType); }
        function triggerAction() {
            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));
            const hit = shutters.find(s => ray.ray.distanceToPoint(s.mesh.position) < 3);
            if (hit && !hit.isMoving) { hit.isOpen = !hit.isOpen; hit.targetY = hit.isOpen ? hit.initialY + 3.6 : hit.initialY; hit.isMoving = true; }
        }
        buildBtn.onclick = toggleBuildMode; placeBtn.onclick = placeObject; actionBtn.onclick = triggerAction;
        typeBtn.onclick = () => { currentType = (currentType + 1) % wallTypes.length; typeBtn.innerText = `TYPE: ${wallTypes[currentType].name}`; };

        // --- Mobile Touch ---
        let moveVec = { x: 0, y: 0 }, moveId = null, lookId = null, lastLook = { x: 0, y: 0 };
        const stick = document.getElementById('stick'), moveZone = document.getElementById('move-zone');
        window.addEventListener('touchstart', (e) => { for (let t of e.changedTouches) { if (t.clientX < window.innerWidth / 2) moveId = t.identifier; else { lookId = t.identifier; lastLook = { x: t.clientX, y: t.clientY }; } } });
        window.addEventListener('touchmove', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveId) {
                    const r = moveZone.getBoundingClientRect(), dx = t.clientX - (r.left + 40), dy = t.clientY - (r.top + 40), d = Math.min(30, Math.sqrt(dx*dx + dy*dy)), a = Math.atan2(dy, dx);
                    moveVec = { x: (Math.cos(a) * d) / 30, y: (Math.sin(a) * d) / 30 }; stick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                } else if (t.identifier === lookId && !document.pointerLockElement) {
                    camera.rotation.y -= (t.clientX - lastLook.x) * 0.005;
                    camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - (t.clientY - lastLook.y) * 0.005));
                    lastLook = { x: t.clientX, y: t.clientY };
                }
            }
        });
        window.addEventListener('touchend', (e) => { for (let t of e.changedTouches) { if (t.identifier === moveId) { moveId = null; moveVec = { x: 0, y: 0 }; stick.style.transform = 'none'; } if (t.identifier === lookId) lookId = null; } });

        const ghost = new THREE.Mesh(wallGeo, new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 })); scene.add(ghost);

        function animate() {
            requestAnimationFrame(animate);
            // シャッターアニメ
            shutters.forEach(s => {
                if (s.isMoving) {
                    s.mesh.position.y += (s.targetY - s.mesh.position.y) * 0.1;
                    if (Math.abs(s.targetY - s.mesh.position.y) < 0.01) { s.mesh.position.y = s.targetY; s.isMoving = false; }
                }
            });

            // キーボード移動
            let x = 0, z = 0;
            if (keys['KeyW']) z -= 1; if (keys['KeyS']) z += 1;
            if (keys['KeyA']) x -= 1; if (keys['KeyD']) x += 1;
            if (moveVec.x !== 0 || moveVec.y !== 0) { x = moveVec.x; z = moveVec.y; }

            if (x !== 0 || z !== 0) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const vx = (f.x * -z + r.x * x) * 0.15, vz = (f.z * -z + r.z * x) * 0.15;
                const nextPos = camera.position.clone().add(new THREE.Vector3(vx, 0, vz));
                const pBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(0.7, 1.8, 0.7));
                if (!colliders.some(c => pBox.intersectsBox(c.box))) { camera.position.x += vx; camera.position.z += vz; }
            }
            light.position.copy(camera.position);

            const ray = new THREE.Raycaster(camera.position, new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion));
            actionBtn.style.display = shutters.some(s => ray.ray.distanceToPoint(s.mesh.position) < 3.5) ? 'block' : 'none';

            if (isBuildMode) {
                const f = new THREE.Vector3(0,0,-4).applyQuaternion(camera.quaternion);
                ghost.position.set(Math.round(camera.position.x + f.x), 2, Math.round(camera.position.z + f.z));
                ghost.rotation.y = Math.round(camera.rotation.y / (Math.PI/2)) * (Math.PI/2);
            }

            const cx = Math.round(camera.position.x / 8), cz = Math.round(camera.position.z / 8);
            for(let i=cx-6; i<=cx+6; i++) for(let j=cz-6; j<=cz+6; j++) spawnChunk(i, j);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
