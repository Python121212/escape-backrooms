<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Backrooms MMO - Ultra Lite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; position: fixed; width: 100vw; height: 100vh; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; color: #0f0; font-family: monospace; }
        #build-menu { position: absolute; top: 10px; right: 10px; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; pointer-events: auto; }
        .ui-btn { width: 50px; height: 50px; background: rgba(0,255,0,0.1); border: 2px solid #0f0; color: #0f0; font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        #jump-btn { position: absolute; bottom: 40px; right: 20px; width: 70px; height: 70px; border-radius: 50%; border: 2px solid #0f0; background: rgba(0,255,0,0.2); color: #0f0; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="ui">
        <div style="padding:15px; font-size:10px;">REC ● LITE_MODE<br>MODEL: OPTIMIZED</div>
        <div id="crosshair"></div>
        <div id="build-menu">
            <div class="ui-btn" onclick="setBuild('wall')">WALL</div>
            <div class="ui-btn" onclick="setBuild('delete')" style="color:#f00; border-color:#f00;">DEL</div>
        </div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1a00);
        scene.fog = new THREE.Fog(0x1a1a00, 1, 12);
        
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 30);
        camera.position.set(0, 1.7, 0);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setPixelRatio(0.7); // 解像度を落として負荷を半分にする
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // ライトを最小限に
        const light = new THREE.AmbientLight(0xffffff, 1.5); scene.add(light);

        const colliders = [], chunks = new Map(), otherPlayers = new Map();
        const gltfLoader = new GLTFLoader();

        // 壁の生成（描画を高速化）
        const wallMat = new THREE.MeshLambertMaterial({color: 0x887733});
        function spawn(cx, cz) {
            const k = `${cx},${cz}`; if(chunks.has(k)) return;
            const g = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0x444422}));
            floor.rotation.x = -Math.PI/2; g.add(floor);
            
            if(Math.abs(cx%2)===1 && Math.abs(cz%2)===1) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(1.2,4,1.2), wallMat);
                p.position.y = 2; g.add(p);
                colliders.push(new THREE.Box3().setFromObject(p).translate(new THREE.Vector3(cx*8,0,cz*8)));
            }
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(k, g);
        }

        // --- プレイヤーモデル読み込み (軽量化設定) ---
        function loadOtherPlayer(id) {
            gltfLoader.load('class_a_nbc_hazmat.glb', (gltf) => {
                const m = gltf.scene; m.scale.set(0.9, 0.9, 0.9);
                // 内部の質感をすべて軽量なものに置き換える
                m.traverse(child => {
                    if (child.isMesh) {
                        child.material = new THREE.MeshBasicMaterial({ map: child.material.map, color: 0xffffff });
                    }
                });
                const mixer = new THREE.AnimationMixer(m);
                if(gltf.animations.length > 0) mixer.clipAction(gltf.animations[0]).play();
                scene.add(m);
                otherPlayers.set(id, { m, mixer });
            });
        }

        // 操作
        let keys = {}, vY = 0, isG = true;
        window.addEventListener('keydown', e => keys[e.code]=true);
        window.addEventListener('keyup', e => keys[e.code]=false);
        renderer.domElement.addEventListener('mousedown', () => renderer.domElement.requestPointerLock());
        window.addEventListener('mousemove', e => {
            if(document.pointerLockElement){
                camera.rotation.y -= e.movementX*0.003;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY*0.003));
            }
        });
        document.getElementById('jump-btn').onclick = () => { if(isG){vY=0.15; isG=false;} };

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // 重力と移動
            vY -= 0.008; camera.position.y += vY;
            if(camera.position.y <= 1.7){ camera.position.y = 1.7; vY = 0; isG = true; }

            const speed = 0.12;
            let kx = (keys['KeyD']?1:0)-(keys['KeyA']?1:0), kz = (keys['KeyS']?1:0)-(keys['KeyW']?1:0);
            if(kx || kz) {
                const dir = new THREE.Vector3(kx, 0, kz).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const next = camera.position.clone().addScaledVector(dir, speed);
                if(!colliders.some(c => next.distanceTo(c.getCenter(new THREE.Vector3())) < 1.5)) camera.position.copy(next);
            }

            const cx = Math.round(camera.position.x/8), cz = Math.round(camera.position.z/8);
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) spawn(cx+i, cz+j);
            
            otherPlayers.forEach(p => { if(p.mixer) p.mixer.update(delta); });
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
