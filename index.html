<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms - Dual Touch Control</title>
    <style>
        body { margin: 0; overflow: hidden; background: #dac05e; touch-action: none; font-family: monospace; }
        /* スティックの外枠（左下固定） */
        #move-zone { position: absolute; bottom: 40px; left: 40px; width: 100px; height: 100px; background: rgba(255,255,255,0.2); border-radius: 50%; border: 2px solid rgba(0,0,0,0.3); z-index: 200; pointer-events: auto; }
        #stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; background: rgba(0,0,0,0.5); border-radius: 50%; pointer-events: none; }
        #ui-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; }
        .btn { position: absolute; right: 20px; bottom: 20px; pointer-events: auto; padding: 15px; background: rgba(0,0,0,0.8); color: white; border: 2px solid #fff; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="move-zone"><div id="stick"></div></div>
    <div id="ui-container">
        <button id="build-btn" class="btn">B - BUILD</button>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdac05e);
        scene.fog = new THREE.Fog(0xdac05e, 1, 35);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.7, 0);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.8));
        const mainLight = new THREE.PointLight(0xffffee, 1.2, 15);
        scene.add(mainLight);

        // 天井・床・壁の共通素材
        const wallMat = new THREE.MeshLambertMaterial({ color: 0xccbb55 });
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x8a7c52 });
        const ceilMat = new THREE.MeshLambertMaterial({ color: 0xdac05e });
        const lampMat = new THREE.MeshBasicMaterial({ color: 0xffffff });

        const chunks = new Map(), colliders = [];

        function spawnChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks.has(key)) return;
            const g = new THREE.Group();
            const f = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), floorMat); f.rotation.x = -Math.PI/2; g.add(f);
            const c = new THREE.Mesh(new THREE.PlaneGeometry(8, 8), ceilMat); c.rotation.x = Math.PI/2; c.position.y = 4; g.add(c);
            const l = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.01, 2), lampMat); l.position.set(0, 3.99, 0); g.add(l);
            if (Math.abs(Math.sin(cx*12.9 + cz*78.2)) > 0.8) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8, 4, 0.5), wallMat); w.position.set(0, 2, 4); g.add(w);
                colliders.push({ box: new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(cx*8, 0, cz*8)) });
            }
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(key, g);
        }

        // --- 入力管理 ---
        let keys = {}, moveVec = { x: 0, z: 0 };
        let moveTouchId = null, lookTouchId = null, lastLookPos = { x: 0, y: 0 };

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        // タッチ開始
        window.addEventListener('touchstart', (e) => {
            for (let t of e.changedTouches) {
                if (t.clientX < window.innerWidth / 2 && moveTouchId === null) {
                    // 左半分：移動開始
                    moveTouchId = t.identifier;
                    updateMoveStick(t.clientX, t.clientY);
                } else if (t.clientX >= window.innerWidth / 2 && lookTouchId === null) {
                    // 右半分：視点移動開始
                    lookTouchId = t.identifier;
                    lastLookPos = { x: t.clientX, y: t.clientY };
                }
            }
        }, { passive: false });

        // タッチ移動
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) {
                    updateMoveStick(t.clientX, t.clientY);
                } else if (t.identifier === lookTouchId) {
                    const dx = t.clientX - lastLookPos.x;
                    const dy = t.clientY - lastLookPos.y;
                    camera.rotation.y -= dx * 0.006;
                    camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - dy * 0.006));
                    lastLookPos = { x: t.clientX, y: t.clientY };
                }
            }
        }, { passive: false });

        // タッチ終了
        window.addEventListener('touchend', (e) => {
            for (let t of e.changedTouches) {
                if (t.identifier === moveTouchId) {
                    moveTouchId = null;
                    moveVec = { x: 0, z: 0 };
                    document.getElementById('stick').style.transform = `translate(0px, 0px)`;
                } else if (t.identifier === lookTouchId) {
                    lookTouchId = null;
                }
            }
        });

        function updateMoveStick(tx, ty) {
            const r = document.getElementById('move-zone').getBoundingClientRect();
            const dx = tx - (r.left + 50);
            const dy = ty - (r.top + 50);
            const d = Math.min(40, Math.sqrt(dx*dx + dy*dy));
            const a = Math.atan2(dy, dx);
            moveVec = { x: Math.cos(a) * (d / 40), z: Math.sin(a) * (d / 40) };
            document.getElementById('stick').style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        }

        // PC視点移動
        window.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.003));
            }
        });
        renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();

        function animate() {
            requestAnimationFrame(animate);

            let vx = 0, vz = 0;
            if (keys['KeyW']) vz = -1; if (keys['KeyS']) vz = 1;
            if (keys['KeyA']) vx = -1; if (keys['KeyD']) vx = 1;
            if (moveVec.x !== 0 || moveVec.z !== 0) { vx = moveVec.x; vz = moveVec.z; }

            if (vx !== 0 || vz !== 0) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y = 0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const vel = new THREE.Vector3().addScaledVector(f, -vz).addScaledVector(r, vx).setLength(0.12);
                const nextPos = camera.position.clone().add(vel);
                if (!colliders.some(c => new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(0.6, 1.8, 0.6)).intersectsBox(c.box))) {
                    camera.position.copy(nextPos);
                }
            }

            mainLight.position.copy(camera.position);
            const cx = Math.round(camera.position.x / 8), cz = Math.round(camera.position.z / 8);
            for(let i=cx-4; i<=cx+4; i++) for(let j=cz-4; j<=cz+4; j++) spawnChunk(i, j);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
