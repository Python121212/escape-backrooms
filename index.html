<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Backrooms MMO - Animated Lite</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; position: fixed; width: 100vw; height: 100vh; }
        canvas { display: block; }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; color: #0f0; font-family: monospace; }
        .vhs-text { position: absolute; top: 15px; left: 15px; font-size: 10px; text-shadow: 1px 1px #000; }
        #jump-btn { position: absolute; bottom: 40px; right: 20px; width: 60px; height: 60px; border-radius: 50%; border: 2px solid #0f0; background: rgba(0,255,0,0.1); color: #0f0; display: flex; align-items: center; justify-content: center; pointer-events: auto; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="vhs-text">REC ● <span id="timer">00:00:00</span><br>SYSTEM: OPTIMIZED<br>ANIMATION: ENABLED</div>
        <div id="jump-btn">JUMP</div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // シーン設定
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x111100);
        scene.fog = new THREE.Fog(0x111100, 1, 15);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 30);
        camera.position.set(0, 1.7, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setPixelRatio(0.8); // 解像度をさらに下げて高速化
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        const light = new THREE.PointLight(0xffffff, 10, 12); scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const colliders = [], chunks = new Map(), otherPlayers = new Map();
        const gltfLoader = new GLTFLoader();

        // 壁の生成（負荷を最小限に）
        function spawn(cx, cz) {
            const k = `${cx},${cz}`; if(chunks.has(k)) return;
            const g = new THREE.Group();
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0x444422}));
            floor.rotation.x = -Math.PI/2; g.add(floor);
            
            if(Math.abs(cx%2)===1 && Math.abs(cz%2)===1) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(1.2,4,1.2), new THREE.MeshLambertMaterial({color:0x887733}));
                p.position.y = 2; g.add(p);
                colliders.push(new THREE.Box3().setFromObject(p).translate(new THREE.Vector3(cx*8,0,cz*8)));
            }
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(k, g);
        }

        // --- アニメーション対応モデル読み込み ---
        function loadModel(id) {
            gltfLoader.load('class_a_nbc_hazmat.glb', (gltf) => {
                const model = gltf.scene;
                model.scale.set(0.9, 0.9, 0.9);
                
                // アニメーション設定
                const mixer = new THREE.AnimationMixer(model);
                if (gltf.animations.length > 0) {
                    const action = mixer.clipAction(gltf.animations[0]); // 最初の動きを再生
                    action.play();
                }

                scene.add(model);
                otherPlayers.set(id, { model, mixer });
            });
        }

        // 仮のマルチプレイ用テスト（本来はFirebaseから取得）
        // loadModel("test_player"); 

        // 操作
        let mv = {x:0, z:0}, vY = 0, isG = true;
        window.addEventListener('touchstart', e => { if(e.touches[0].clientX > window.innerWidth/2) { if(isG){vY=0.15; isG=false;} } });

        const clock = new THREE.Clock();
        function animate() {
            requestAnimationFrame(animate);
            const delta = clock.getDelta();
            
            // 重力
            vY -= 0.008; camera.position.y += vY;
            if(camera.position.y <= 1.7){ camera.position.y = 1.7; vY = 0; isG = true; }

            // 迷路生成
            const cx = Math.round(camera.position.x/8), cz = Math.round(camera.position.z/8);
            for(let i=-1; i<=1; i++) for(let j=-1; j<=1; j++) spawn(cx+i, cz+j);
            
            // アニメーション更新
            otherPlayers.forEach(p => { if(p.mixer) p.mixer.update(delta); });

            light.position.copy(camera.position);
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
