<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms - Ultralight & Ceiling</title>
    <style>
        body { margin: 0; overflow: hidden; background: #dac05e; touch-action: none; font-family: monospace; }
        #ui-container { position: absolute; width: 100%; height: 100%; pointer-events: none; z-index: 100; display: flex; flex-direction: column; justify-content: flex-end; align-items: flex-end; padding: 20px; box-sizing: border-box; }
        .btn { pointer-events: auto; padding: 12px; background: rgba(0,0,0,0.8); color: white; border: 2px solid #fff; border-radius: 6px; font-size: 14px; margin-bottom: 8px; min-width: 140px; font-weight: bold; }
        #move-zone { position: absolute; bottom: 30px; left: 30px; width: 80px; height: 80px; background: rgba(255,255,255,0.1); border-radius: 50%; }
        #stick { position: absolute; top: 50%; left: 50%; width: 30px; height: 30px; margin: -15px; background: rgba(0,0,0,0.4); border-radius: 50%; }
    </style>
</head>
<body>
    <div id="move-zone"><div id="stick"></div></div>
    <div id="ui-container">
        <button id="action-btn" class="btn" style="display:none; background: #ff4757;">E - ACTION</button>
        <button id="build-btn" class="btn" style="background: #e6b400; color: #000;">B - BUILD</button>
    </div>

    <script type="importmap">{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }</script>

    <script type="module">
        import * as THREE from 'three';

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0xdac05e);
        scene.fog = new THREE.Fog(0xdac05e, 1, 50);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.7, 5);
        camera.rotation.order = 'YXZ';

        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(1); // 軽量化のため1固定
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.5));

        const wallMat = new THREE.MeshLambertMaterial({ color: 0xccbb55 });
        const floorMat = new THREE.MeshLambertMaterial({ color: 0x8a7c52 });
        const ceilingMat = new THREE.MeshLambertMaterial({ color: 0xdac05e });
        const lightMat = new THREE.MeshBasicMaterial({ color: 0xffffee });

        const chunks = new Map();
        const chunkSize = 8;
        const colliders = [];

        function spawnChunk(cx, cz) {
            const key = `${cx},${cz}`;
            if (chunks.has(key)) return;

            const group = new THREE.Group();
            
            // 床
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(chunkSize, chunkSize), floorMat);
            floor.rotation.x = -Math.PI / 2;
            group.add(floor);

            // 天井
            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(chunkSize, chunkSize), ceilingMat);
            ceiling.rotation.x = Math.PI / 2;
            ceiling.position.y = 4;
            group.add(ceiling);

            // 蛍光灯 (天井に埋め込み)
            const lamp = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.05, 3), lightMat);
            lamp.position.set(0, 3.98, 0);
            group.add(lamp);
            
            // ポイントライト (負荷軽減のため各チャンクに1つのみ)
            const pLight = new THREE.PointLight(0xffffee, 0.8, 12);
            pLight.position.set(0, 3.5, 0);
            group.add(pLight);

            // ランダムな壁
            const seed = Math.abs(Math.sin(cx * 12.9 + cz * 78.2) * 437) % 1;
            if (seed > 0.7) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(chunkSize, 4, 0.5), wallMat);
                w.position.set(0, 2, chunkSize/2);
                group.add(w);
                const box = new THREE.Box3().setFromObject(w);
                box.translate(new THREE.Vector3(cx * chunkSize, 0, cz * chunkSize));
                colliders.push({ box, id: key });
            }

            group.position.set(cx * chunkSize, 0, cz * chunkSize);
            scene.add(group);
            chunks.set(key, { group, time: Date.now() });
        }

        // --- 軽量化ロジック (遠くのチャンクを削除) ---
        function updateChunks() {
            const cx = Math.round(camera.position.x / chunkSize);
            const cz = Math.round(camera.position.z / chunkSize);
            const keepRadius = 4;

            for (let x = cx - keepRadius; x <= cx + keepRadius; x++) {
                for (let z = cz - keepRadius; z <= cz + keepRadius; z++) {
                    spawnChunk(x, z);
                }
            }

            // 古いチャンクのクリーンアップ
            if (chunks.size > 100) {
                for (const [key, data] of chunks) {
                    const [kx, kz] = key.split(',').map(Number);
                    if (Math.abs(kx - cx) > keepRadius + 1 || Math.abs(kz - cz) > keepRadius + 1) {
                        scene.remove(data.group);
                        chunks.delete(key);
                        const idx = colliders.findIndex(c => c.id === key);
                        if (idx > -1) colliders.splice(idx, 1);
                    }
                }
            }
        }

        // --- 入力系 (PC & Mobile) ---
        let keys = {};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);

        let moveVec = { x: 0, y: 0 };
        const stick = document.getElementById('stick');
        window.addEventListener('touchmove', e => {
            const t = e.touches[0];
            const r = document.getElementById('move-zone').getBoundingClientRect();
            const dx = t.clientX - (r.left + 40), dy = t.clientY - (r.top + 40);
            const d = Math.min(30, Math.sqrt(dx*dx + dy*dy));
            const a = Math.atan2(dy, dx);
            moveVec = { x: (Math.cos(a) * d) / 30, y: (Math.sin(a) * d) / 30 };
            stick.style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
        });
        window.addEventListener('touchend', () => { moveVec = { x: 0, y: 0 }; stick.style.transform = 'none'; });

        // マウス視点移動
        window.addEventListener('mousemove', e => {
            if (document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.003));
            }
        });
        renderer.domElement.onclick = () => renderer.domElement.requestPointerLock();

        function animate() {
            requestAnimationFrame(animate);
            
            // 移動処理
            let mx = moveVec.x, mz = moveVec.y;
            if (keys['KeyW']) mz = -1; if (keys['KeyS']) mz = 1;
            if (keys['KeyA']) mx = -1; if (keys['KeyD']) mx = 1;

            if (mx !== 0 || mz !== 0) {
                const dir = new THREE.Vector3(mx, 0, mz).applyQuaternion(camera.quaternion);
                dir.y = 0; dir.normalize();
                const nextPos = camera.position.clone().addScaledVector(dir, 0.12);
                const pBox = new THREE.Box3().setFromCenterAndSize(nextPos, new THREE.Vector3(0.6, 1.8, 0.6));
                if (!colliders.some(c => pBox.intersectsBox(c.box))) {
                    camera.position.x = nextPos.x;
                    camera.position.z = nextPos.z;
                }
            }

            updateChunks();
            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
