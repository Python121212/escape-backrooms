<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Backrooms MMO - Total Fix</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; position: fixed; width: 100%; height: 100%; }
        canvas { display: block; filter: contrast(1.1) brightness(1.1); }
        #ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 100; color: #0f0; font-family: monospace; }
        .vhs-text { position: absolute; top: 20px; left: 20px; font-size: 12px; text-shadow: 1px 1px #000; }
        #joy-base { position: absolute; bottom: 40px; left: 40px; width: 80px; height: 80px; border: 2px solid rgba(0,255,0,0.5); border-radius: 50%; background: rgba(0,255,0,0.1); pointer-events: none; z-index: 150; }
        #stick { position: absolute; top: 50%; left: 50%; width: 40px; height: 40px; margin: -20px; background: #0f0; border-radius: 50%; }
    </style>
</head>
<body>
    <div id="ui">
        <div class="vhs-text">REC ● <span id="timer">00:00:00</span><br>A-SYNC UNIT: ACTIVE<br>STATUS: SYNCED</div>
    </div>
    <div id="joy-base"><div id="stick"></div></div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
            "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { initializeApp } from 'firebase/app';
        import { getDatabase, ref, set, onValue, onChildRemoved, onDisconnect } from 'firebase/database';

        const firebaseConfig = {
            apiKey: "AIzaSyDknkrM78uvtu5BfAYsuJCa-oRB2rfH3HQ",
            authDomain: "backrooms-mmo.firebaseapp.com",
            databaseURL: "https://backrooms-mmo-default-rtdb.firebaseio.com",
            projectId: "backrooms-mmo",
            storageBucket: "backrooms-mmo.firebasestorage.app",
            messagingSenderId: "64360079618",
            appId: "1:64360079618:web:240178c335c04cd373621b"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const myId = "A-SYNC_" + Math.random().toString(36).substring(7);
        const myRef = ref(db, 'players/' + myId);

        // --- Engine ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x2a2a00);
        scene.fog = new THREE.Fog(0x2a2a00, 1, 20);
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 50);
        camera.position.set(0, 1.7, 0); camera.rotation.order = 'YXZ';
        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);
        scene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const pointLight = new THREE.PointLight(0xffffff, 5, 15); scene.add(pointLight);

        const colliders = [], chunks = new Map(), otherPlayers = new Map();

        // --- Realistic Hazmat Model ---
        function createHazmat() {
            const g = new THREE.Group();
            const mat = new THREE.MeshStandardMaterial({ color: 0xddcc00, roughness: 0.3 });
            const vMat = new THREE.MeshStandardMaterial({ color: 0x050505, metalness: 0.9, roughness: 0 });
            const body = new THREE.Mesh(new THREE.CapsuleGeometry(0.3, 0.7, 4, 8), mat); body.position.y = 0.85; g.add(body);
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 12, 12), mat); head.position.y = 1.5; g.add(head);
            const visor = new THREE.Mesh(new THREE.SphereGeometry(0.16, 12, 12), vMat); visor.scale.set(1.1, 0.8, 0.5); visor.position.set(0, 1.52, 0.15); g.add(visor);
            const pack = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.6, 0.2), mat); pack.position.set(0, 1.0, -0.25); g.add(pack);
            return g;
        }

        // --- Maze Generator ---
        function spawn(cx, cz) {
            const k = `${cx},${cz}`; if(chunks.has(k)) return;
            const g = new THREE.Group();
            g.add(new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0x9a8c62})).rotateX(-Math.PI/2));
            const c = new THREE.Mesh(new THREE.PlaneGeometry(8,8), new THREE.MeshLambertMaterial({color:0xddcc66})); c.position.y=4; c.rotateX(Math.PI/2); g.add(c);
            if(Math.abs(cx%2)===1 && Math.abs(cz%2)===1) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(1.2,4,1.2), new THREE.MeshLambertMaterial({color:0xddcc66})); p.position.y=2; g.add(p);
                colliders.push(new THREE.Box3().setFromObject(p).translate(new THREE.Vector3(cx*8,0,cz*8)));
            }
            if(Math.abs(Math.sin(cx*1.3+cz*0.7)) > 0.8) {
                const w = new THREE.Mesh(new THREE.BoxGeometry(8,4,0.4), new THREE.MeshLambertMaterial({color:0xddcc66})); w.position.set(0,2,4); g.add(w);
                colliders.push(new THREE.Box3().setFromObject(w).translate(new THREE.Vector3(cx*8,0,cz*8)));
            }
            g.position.set(cx*8, 0, cz*8); scene.add(g); chunks.set(k, g);
        }

        // --- Sync ---
        onValue(ref(db, 'players'), snap => {
            const d = snap.val(); if(!d) return;
            for(let id in d) {
                if(id === myId) continue;
                if(!otherPlayers.has(id)) { const m = createHazmat(); scene.add(m); otherPlayers.set(id, m); }
                const m = otherPlayers.get(id); m.position.set(d[id].x, d[id].y-1.7, d[id].z); m.rotation.y = d[id].ry;
            }
        });
        onChildRemoved(ref(db, 'players'), snap => { if(otherPlayers.has(snap.key)){ scene.remove(otherPlayers.get(snap.key)); otherPlayers.delete(snap.key); } });
        onDisconnect(myRef).remove();

        // --- Controls (Unified) ---
        let keys = {}, mv = {x:0, z:0}, moveId = null, lookId = null, lastL = {x:0, y:0};
        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        
        // Mouse look
        renderer.domElement.addEventListener('mousedown', () => renderer.domElement.requestPointerLock());
        window.addEventListener('mousemove', e => {
            if(document.pointerLockElement) {
                camera.rotation.y -= e.movementX * 0.003;
                camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - e.movementY * 0.003));
            }
        });

        // Touch controls
        window.addEventListener('touchstart', e => {
            for(let t of e.changedTouches) {
                if(t.clientX < window.innerWidth/2) moveId = t.identifier;
                else { lookId = t.identifier; lastL = {x:t.clientX, y:t.clientY}; }
            }
        }, {passive:false});

        window.addEventListener('touchmove', e => {
            e.preventDefault();
            for(let t of e.touches) {
                if(t.identifier === moveId) {
                    const dx = t.clientX - 80, dy = t.clientY - (window.innerHeight - 80);
                    const d = Math.min(35, Math.sqrt(dx*dx+dy*dy)), a = Math.atan2(dy, dx);
                    mv = {x: Math.cos(a)*(d/35), z: Math.sin(a)*(d/35)};
                    document.getElementById('stick').style.transform = `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px)`;
                } else if(t.identifier === lookId) {
                    camera.rotation.y -= (t.clientX - lastL.x) * 0.008;
                    camera.rotation.x = Math.max(-1.4, Math.min(1.4, camera.rotation.x - (t.clientY - lastL.y) * 0.008));
                    lastL = {x:t.clientX, y:t.clientY};
                }
            }
        }, {passive:false});

        window.addEventListener('touchend', e => {
            for(let t of e.changedTouches) {
                if(t.identifier === moveId) { moveId = null; mv = {x:0, z:0}; document.getElementById('stick').style.transform = 'none'; }
                if(t.identifier === lookId) lookId = null;
            }
        });

        let lastSend = 0;
        function animate(t) {
            requestAnimationFrame(animate);
            // Move Logic
            let kx = (keys['KeyD']?1:0)-(keys['KeyA']?1:0) || mv.x;
            let kz = (keys['KeyS']?1:0)-(keys['KeyW']?1:0) || mv.z;
            if(kx || kz) {
                const f = new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion); f.y=0; f.normalize();
                const r = new THREE.Vector3().crossVectors(camera.up, f).negate();
                const next = camera.position.clone().addScaledVector(f, -kz*0.13).addScaledVector(r, kx*0.13);
                // Collision check
                const pBox = new THREE.Box3().setFromCenterAndSize(next, new THREE.Vector3(0.6, 1.8, 0.6));
                if(!colliders.some(c => pBox.intersectsBox(c))) camera.position.copy(next);
            }

            // World Gen & Sync
            const cx = Math.round(camera.position.x/8), cz = Math.round(camera.position.z/8);
            for(let i=-2; i<=2; i++) for(let j=-2; j<=2; j++) spawn(cx+i, cz+j);
            pointLight.position.copy(camera.position);

            if(t - lastSend > 100) {
                set(myRef, { x: camera.position.x, y: camera.position.y, z: camera.position.z, ry: camera.rotation.y });
                lastSend = t;
            }
            renderer.render(scene, camera);
            document.getElementById('timer').innerText = new Date(t).toISOString().substr(14, 8);
        }
        animate(0);
        window.addEventListener('resize', () => { camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });
    </script>
</body>
</html>
